        syncMonitorForBonniePresence();
      };

      const buildBonnieAttackTimeline = () => {
        if (!BONNIE_ATTACK_ENABLED) return [];

        bonnieAttackCount = 1;
        return [randomBetween(NIGHT1_BONNIE_FIRST_ATTACK_MIN_MS, NIGHT1_BONNIE_FIRST_ATTACK_MAX_MS)];
      };

      const resetBonnieState = () => {
        resetBonnieLeftPipeStage();
        clearBonnieDirectKillTimer();
        clearBonnieAlarmTimers();
        bonnieActive = false;
        bonnieCurrentRoom = "classroom-b";
        bonnieRoutePlan = [];
        bonnieRouteStepIndex = -1;
        bonnieRouteStepMs = 0;
        bonnieRouteStepDurationMs = 0;
        bonnieRouteMode = "auto";
        bonnieBranchResolved = false;
        bonnieForcedPipeRoute = false;
        bonnieEnteredCam1 = false;
        bonnieAttackStarted = false;
        bonnieAlarmActive = false;
        bonnieAlarmCooldown = false;
        bonnieAlarmFailedAttempts = 0;
        bonnieAlarmFailLimit = randomBetween(3, 4);
        bonnieAlarmBurned = false;
        bonnieAttackTriggeredCount = 0;
        bonnieAttackTimeline = buildBonnieAttackTimeline();
        bonnieNextAttackIndex = 0;
        bonnieAttackScheduledMs = bonnieAttackTimeline[0] || (NIGHT_DURATION_MS + 1000);
        setBonnieMaskState(false);
        setBonnieAlarmBurnedVisual();
        updateBonnieMapNoise();
      };

      const syncMonitorForBonniePresence = () => {
        if (typeof window.__daymoriSyncCurrentMonitorRoom === "function") {
          window.__daymoriSyncCurrentMonitorRoom();
        }
      };

      const playMonitorAlarmSound = (intensity = 1, durationMs = BONNIE_ALARM_ACTIVE_MS) => {
        const ctx = getJumpscareAudioContext();
        if (!ctx) return;
        const now = ctx.currentTime;
        const amount = clamp(intensity, 0.35, 1.2);

        const totalSec = Math.max(1, durationMs / 1000);
        const stopAt = now + totalSec;

        const master = ctx.createGain();
        master.gain.setValueAtTime(0.0001, now);
        master.gain.linearRampToValueAtTime(0.13 * amount, now + 0.04);
        master.gain.setValueAtTime(0.13 * amount, stopAt - 0.08);
        master.gain.exponentialRampToValueAtTime(0.0001, stopAt);
        master.connect(ctx.destination);

        for (let index = 0; index < Math.floor(totalSec / 0.5); index += 1) {
          const burstAt = now + index * 0.5;
          const beep = ctx.createOscillator();
          const beepFilter = ctx.createBiquadFilter();
          const beepGain = ctx.createGain();
          beep.type = "square";
          beep.frequency.setValueAtTime(index % 2 === 0 ? 760 : 640, burstAt);
          beep.frequency.linearRampToValueAtTime(index % 2 === 0 ? 620 : 780, burstAt + 0.24);
          beepFilter.type = "bandpass";
          beepFilter.frequency.setValueAtTime(1450, burstAt);
          beepFilter.Q.value = 2.4;
          beepGain.gain.setValueAtTime(0.0001, burstAt);
          beepGain.gain.linearRampToValueAtTime(0.18 * amount, burstAt + 0.02);
          beepGain.gain.exponentialRampToValueAtTime(0.0001, burstAt + 0.28);
          beep.connect(beepFilter).connect(beepGain).connect(master);
          beep.start(burstAt);
          beep.stop(Math.min(stopAt, burstAt + 0.3));
        }

        const rumble = ctx.createOscillator();
        const rumbleGain = ctx.createGain();
        rumble.type = "sawtooth";
        rumble.frequency.setValueAtTime(94, now);
        rumble.frequency.exponentialRampToValueAtTime(58, stopAt);
        rumbleGain.gain.setValueAtTime(0.0001, now);
        rumbleGain.gain.linearRampToValueAtTime(0.045 * amount, now + 0.08);
        rumbleGain.gain.exponentialRampToValueAtTime(0.0001, stopAt);
        rumble.connect(rumbleGain).connect(master);
        rumble.start(now);
        rumble.stop(stopAt + 0.02);
      };

      const beginBonnieAlarmCycle = () => {
        if (bonnieAlarmBurned || bonnieAlarmActive || bonnieAlarmCooldown) return false;
        bonnieAlarmActive = true;
        setBonnieAlarmBurnedVisual();
        playMonitorAlarmSound(1, BONNIE_ALARM_ACTIVE_MS);
        clearBonnieAlarmTimers();
        bonnieAlarmCycleTimer = window.setTimeout(() => {
          bonnieAlarmCycleTimer = null;
          bonnieAlarmActive = false;
          bonnieAlarmCooldown = true;
          setBonnieAlarmBurnedVisual();
          bonnieAlarmCooldownTimer = window.setTimeout(() => {
            bonnieAlarmCooldownTimer = null;
            bonnieAlarmCooldown = false;
            setBonnieAlarmBurnedVisual();
          }, BONNIE_ALARM_COOLDOWN_MS);
        }, BONNIE_ALARM_ACTIVE_MS);
        return true;
      };

      const registerBonnieAlarmInvalidAttempt = () => {
        bonnieAlarmFailedAttempts += 1;
        if (bonnieAlarmFailedAttempts >= bonnieAlarmFailLimit) {
          bonnieAlarmBurned = true;
          setBonnieAlarmBurnedVisual();
        }
      };

      const enterBonnieLeftPipeStage = () => {
        bonnieActive = false;
        bonnieAtLeftPipe = true;
        bonnieCurrentRoom = null;
        bonniePipeRetreating = false;
        bonniePipeMaskHoldMs = 0;
        bonniePipeMaskRequiredMs = randomBetween(3800, 4600);
        bonniePipeGraceCount = 0;
        clearBonnieVisionRecovery();
        body.classList.remove("bonnie-left-pipe-retreating");
        body.classList.add("bonnie-left-pipe-active");
        syncBonnieLeftPipePresence();
        updateBonnieMapNoise();
        syncMonitorForBonniePresence();
        triggerDangerPremonition(1);
        playBonniePipeApproachSound();
        clearBonniePipeBreachTimer();
        clearBonniePipeRetreatTimer();
        const resolveBonniePipeBreach = () => {
          bonniePipeBreachTimer = null;
          if (!bonnieAtLeftPipe || bonniePipeRetreating || nightCleared || jumpscareActive || gameOverActive) return;
          if (bonnieMaskActive && bonniePipeMaskHoldMs >= bonniePipeMaskRequiredMs) {
            beginBonnieLeftPipeRetreat();
            return;
          }
          if (bonnieMaskActive && bonniePipeGraceCount < 2) {
            bonniePipeGraceCount += 1;
            bonniePipeBreachTimer = window.setTimeout(resolveBonniePipeBreach, 1400);
            return;
          }
          triggerBonnieJumpscare();
        };
        bonniePipeBreachTimer = window.setTimeout(resolveBonniePipeBreach, randomBetween(10200, 12200));
        updateNightDebug();
      };

      const enterBonnieRouteStep = (nextIndex) => {
        if (!BONNIE_ATTACK_ENABLED || nightCleared || gameOverActive || jumpscareActive) return;
        const step = bonnieRoutePlan[nextIndex];
        if (!step) {
          enterBonnieLeftPipeStage();
          return;
        }

        if (step.action === "direct-jumpscare") {
          bonnieActive = false;
          bonnieCurrentRoom = null;
          updateBonnieMapNoise();
          syncMonitorForBonniePresence();
          triggerDangerPremonition(1);
          clearBonnieDirectKillTimer();
          bonnieDirectKillTimer = window.setTimeout(() => {
            bonnieDirectKillTimer = null;
            if (!nightCleared && !jumpscareActive && !gameOverActive) {
              triggerBonnieJumpscare();
            }
          }, getScaledStepDurationMs(step, BONNIE_UI_SPEED_MULTIPLIER));
          return;
        }

        const previousRoom = bonnieCurrentRoom;
        bonnieRouteStepIndex = nextIndex;
        bonnieRouteStepMs = 0;
        bonnieRouteStepDurationMs = getScaledStepDurationMs(step, BONNIE_UI_SPEED_MULTIPLIER);
        bonnieCurrentRoom = step.room;
        bonnieActive = true;
        if (allowPassiveGameplayAudio()) {
          playBonnieMovementCue(step.room, { threatLevel: getBonnieMovementThreat(step.room) });
        }
        if (step.room === "room9") {
          resolveBonnieBranchFromRoom9(false);
        }
        if (step.room === "room14") {
          triggerDangerPremonition(0.96);
        }
        if (step.room === "cam1") {
          bonnieEnteredCam1 = true;
          triggerDangerPremonition(0.95);
        }
        triggerBonnieMonitorTransition(previousRoom, step.room);
        updateBonnieMapNoise();
        syncMonitorForBonniePresence();
      };

      const beginBonnieRoute = () => {
        if (!BONNIE_ATTACK_ENABLED || nightCleared || gameOverActive || jumpscareActive) return;
        if (bonnieAttackTriggeredCount >= bonnieAttackCount) return;
        resetBonnieLeftPipeStage();
        bonnieAttackTriggeredCount += 1;
        bonnieAttackStarted = true;
        bonnieEnteredCam1 = false;
        bonnieRouteStepIndex = -1;
        bonnieRouteStepMs = 0;
        bonnieRouteStepDurationMs = 0;
        bonnieRouteMode = "auto";
        bonnieForcedPipeRoute = false;
        bonnieBranchResolved = false;
        bonnieRoutePlan = BONNIE_ROUTE_ENTRY_STEPS.slice();
        bonnieCurrentRoom = null;
        bonnieActive = true;
        enterBonnieRouteStep(0);
      };

      const getCurrentMonitorRoom = () => {
        const state = window.__daymoriMonitorRoomState;
        if (!state || !state.tabletOpen) return null;
        return state.room || null;
      };

      const handleMonitorAlarm = () => {
        if (!body.classList.contains("tablet-open") || !canRunNight() || nightCleared || gameOverActive || jumpscareActive) return;
        if (!drainPower(POWER_MONITOR_ALARM_COST)) {
          updateNightDebug();
          return;
        }
        if (!beginBonnieAlarmCycle()) {
          updateNightDebug();
          return;
        }
        if (!bonnieAttackStarted || !bonnieCurrentRoom || bonnieAtLeftPipe || bonnieEnteredCam1) {
          registerBonnieAlarmInvalidAttempt();
          setBonnieAlarmBurnedVisual();
          updateNightDebug();
          return;
        }

        if (!BONNIE_EFFECTIVE_ALARM_ROOMS.has(bonnieCurrentRoom)) {
          registerBonnieAlarmInvalidAttempt();
          setBonnieAlarmBurnedVisual();
          updateNightDebug();
          return;
        }

        if (bonnieCurrentRoom === "room9") {
          forceBonniePipeRouteFromRoom9();
          triggerDangerPremonition(0.62);
          updateNightDebug();
          return;
        }

        if (bonnieCurrentRoom === "room14") {
          forceBonnieRetreatFromRoom14ToPipe();
          triggerDangerPremonition(0.72);
          updateNightDebug();
          return;
        }

        registerBonnieAlarmInvalidAttempt();
        setBonnieAlarmBurnedVisual();
        updateNightDebug();
      };

      const advanceBonnieRoute = (deltaMs) => {
        if (!BONNIE_ATTACK_ENABLED || nightCleared || gameOverActive || jumpscareActive) return;
        if (!bonnieAttackStarted) {
          if (bonnieNextAttackIndex >= bonnieAttackTimeline.length) {
            bonnieAttackScheduledMs = NIGHT_DURATION_MS + 1000;
            return;
          }
          if (nightElapsedMs >= bonnieAttackTimeline[bonnieNextAttackIndex]) {
            bonnieNextAttackIndex += 1;
            bonnieAttackScheduledMs = bonnieAttackTimeline[bonnieNextAttackIndex] || (NIGHT_DURATION_MS + 1000);
            beginBonnieRoute();
          }
          return;
        }
        if (!bonnieActive) return;

        const observedRoom = getObservedCameraRoom();
        const isObserved = isObservedRoomMatch(bonnieCurrentRoom, observedRoom);
        const rate = isObserved ? BONNIE_CAMERA_WATCH_SLOWDOWN : 1;
        bonnieRouteStepMs += deltaMs * rate;
        if (bonnieRouteStepMs >= bonnieRouteStepDurationMs) {
          enterBonnieRouteStep(bonnieRouteStepIndex + 1);
        }
      };

      const advanceBonnieLeftPipeStage = (deltaMs) => {
        if (!bonnieAtLeftPipe || bonniePipeRetreating || nightCleared || gameOverActive || jumpscareActive) return;
        if (!bonnieMaskActive) return;

        bonniePipeMaskHoldMs = clamp(bonniePipeMaskHoldMs + deltaMs, 0, bonniePipeMaskRequiredMs);
        if (bonniePipeMaskHoldMs >= bonniePipeMaskRequiredMs) {
          beginBonnieLeftPipeRetreat();
        }
      };

      const advanceChicaFinalStage = (deltaMs) => {
        if (!chicaAttackTriggeredThisNight && !chicaFinalStageActive && !chicaFinalStageRetreating && nightElapsedMs >= chicaAttackScheduledMs) {
          enterChicaFinalStage();
          return;
        }
        if (!chicaFinalStageActive || chicaFinalStageRetreating || nightCleared || gameOverActive || jumpscareActive) return;
        if (!bonnieMaskActive) return;

        chicaFinalStageMaskHoldMs = clamp(chicaFinalStageMaskHoldMs + deltaMs, 0, CHICA_FINAL_STAGE_MASK_HOLD_MS);
        if (chicaFinalStageMaskHoldMs >= CHICA_FINAL_STAGE_MASK_HOLD_MS) {
          beginChicaFinalStageRetreat();
        }
      };

      const emitFlashlightPulse = (clientX, clientY) => {
        if (!drainPower(POWER_ROOM_FLASH_COST)) return false;
        playFlashlightClickSound({ monitor: false });
        clearFlashlightTimers();

        if (viewport) {
          const rect = getViewportRect();
          const px = rect.width > 0 ? ((clientX - rect.left) / rect.width) * 100 : 50;
          const py = rect.height > 0 ? ((clientY - rect.top) / rect.height) * 100 : 52;
          const jitterX = randomFloat(-1.8, 1.8);
          const jitterY = randomFloat(-1.4, 1.4);
          viewport.style.setProperty("--flash-x", `${clamp(px + jitterX, 10, 90)}%`);
          viewport.style.setProperty("--flash-y", `${clamp(py + jitterY, 12, 88)}%`);
          viewport.classList.add("flashlight-active");
          flashlightPulseTimer = window.setTimeout(() => {
            if (viewport) {
              viewport.classList.remove("flashlight-active");
              viewport.classList.add("flashlight-recover");
            }
            flashlightPulseTimer = null;

            flashlightRecoverTimer = window.setTimeout(() => {
              if (viewport) {
                viewport.classList.remove("flashlight-recover");
              }
              flashlightRecoverTimer = null;
            }, FLASHLIGHT_RECOVER_MS + (powerLevel <= POWER_CRITICAL_THRESHOLD ? 180 : 0));
          }, FLASHLIGHT_PULSE_MS);
        }

        doorPresence.classList.add("flashlight-hit");
        flashlightHitTimer = window.setTimeout(() => {
          doorPresence.classList.remove("flashlight-hit");
          flashlightHitTimer = null;
        }, FLASHLIGHT_HIT_CLASS_MS);

        return true;
      };

      const emitMonitorFlashlightPulse = (clientX, clientY, options = {}) => {
        if (!cameraFeed) return;
        const isFloodlight = Boolean(options.floodlight);
        if (!drainPower(isFloodlight ? POWER_MONITOR_FLOODLIGHT_COST : POWER_MONITOR_FLASH_COST)) return;
        playFlashlightClickSound({ monitor: true });
        clearMonitorFlash();

        const rect = getCameraFeedRect();
        const px = isFloodlight ? 50 : (rect.width > 0 ? ((clientX - rect.left) / rect.width) * 100 : 50);
        const py = isFloodlight ? 52 : (rect.height > 0 ? ((clientY - rect.top) / rect.height) * 100 : 52);
        cameraFeed.style.setProperty("--cam-flash-x", `${clamp(px, 8, 92)}%`);
        cameraFeed.style.setProperty("--cam-flash-y", `${clamp(py, 8, 92)}%`);
        cameraFeed.classList.add("monitor-flashlight-active");
        cameraFeed.classList.toggle("monitor-floodlight-active", isFloodlight);
        if (monitorFlashlightBtn) {
          monitorFlashlightBtn.classList.toggle("is-active", isFloodlight);
          monitorFlashlightBtn.setAttribute("aria-pressed", isFloodlight ? "true" : "false");
        }
        monitorFlashTimer = window.setTimeout(() => {
          if (cameraFeed) {
            cameraFeed.classList.remove("monitor-flashlight-active");
            cameraFeed.classList.remove("monitor-floodlight-active");
          }
          if (monitorFlashlightBtn) {
            monitorFlashlightBtn.classList.remove("is-active");
            monitorFlashlightBtn.setAttribute("aria-pressed", "false");
          }
          monitorFlashTimer = null;
        }, isFloodlight ? MONITOR_FLOODLIGHT_MS : 340);

        const monitorState = window.__daymoriMonitorRoomState || {};
        const observedRoom = monitorState.room || null;
        if (isFloodlight && !holderRetreatedThisNight && holderStage === "cam3-ready" && observedRoom === "cam3") {
          holderFlashCount += 1;
          syncHolderState();
          refreshHolderMonitor();
          if (holderFlashCount >= HOLDER_CAM3_REQUIRED_FLASHES) {
            repelHolder();
          } else {
            updateNightDebug();
          }
        }
      };

      const setDoorStage = (stage) => {
        const nextStage = stage === 1 || stage === 2 ? stage : 0;
        if (nextStage) {
          hydrateDoorStageImages(nextStage);
        }
        doorStageClosing = false;
        if (freddyBlackoutTimer) {
          window.clearTimeout(freddyBlackoutTimer);
          freddyBlackoutTimer = null;
        }
        if (freddyBlackoutHideTimer) {
          window.clearTimeout(freddyBlackoutHideTimer);
          freddyBlackoutHideTimer = null;
        }
        if (freddyBlackoutReleaseTimer) {
          window.clearTimeout(freddyBlackoutReleaseTimer);
          freddyBlackoutReleaseTimer = null;
        }
        currentDoorStage = nextStage;
        doorPresence.classList.toggle("stage1-active", nextStage === 1);
        doorPresence.classList.toggle("stage2-active", nextStage === 2);
        doorPresence.classList.remove("stage1-closing");
        doorPresence.classList.remove("stage2-closing");
        doorPresence.classList.remove("stage3-active");
        body.classList.remove("freddy-blackout-active");
        body.classList.remove("freddy-blackout-release");
        if (nextStage !== 2) {
          stopStage2LightFlicker();
        }
        if (viewport) {
          viewport.classList.toggle("stage1-mood", nextStage === 1);
          viewport.classList.toggle("stage2-mood", nextStage === 2);
          viewport.classList.remove("stage3-mood");
          viewport.classList.remove("stage3-pov-active");
        }
      };

      const blackoutStageThenIdle = (stage, reason = "repelled") => {
        if (stage2Timer) {
          window.clearTimeout(stage2Timer);
          stage2Timer = null;
        }
        if (freddyBlackoutTimer) {
          window.clearTimeout(freddyBlackoutTimer);
          freddyBlackoutTimer = null;
        }
        if (freddyBlackoutHideTimer) {
          window.clearTimeout(freddyBlackoutHideTimer);
          freddyBlackoutHideTimer = null;
        }
        if (freddyBlackoutReleaseTimer) {
          window.clearTimeout(freddyBlackoutReleaseTimer);
          freddyBlackoutReleaseTimer = null;
        }

        doorStageClosing = true;
        stopStage2LightFlicker();
        currentDoorStage = 0;
        doorPresence.classList.remove("stage3-active");
        doorPresence.classList.remove("stage1-closing");
        doorPresence.classList.remove("stage2-closing");
        body.classList.remove("freddy-blackout-release");
        body.classList.add("freddy-blackout-active");

        freddyBlackoutHideTimer = window.setTimeout(() => {
          freddyBlackoutHideTimer = null;
          doorPresence.classList.remove("stage1-active");
          doorPresence.classList.remove("stage2-active");
          doorPresence.classList.remove("stage3-active");
          if (viewport) {
            viewport.classList.remove("stage1-mood");
            viewport.classList.remove("stage2-mood");
            viewport.classList.remove("stage3-mood");
            viewport.classList.remove("stage3-pov-active");
          }
        }, FREDDY_BLACKOUT_IN_MS);

        if (viewport) {
          viewport.classList.remove("stage1-mood");
          viewport.classList.add("stage2-mood");
          viewport.classList.remove("stage3-mood");
          viewport.classList.remove("stage3-pov-active");
        }

        if (reason === "breach") {
          breachCount += 1;
        }

        freddyBlackoutTimer = window.setTimeout(() => {
          freddyBlackoutTimer = null;
          body.classList.remove("freddy-blackout-active");
          body.classList.add("freddy-blackout-release");
          doorPresence.classList.remove("stage1-active");
          doorPresence.classList.remove("stage2-active");
          doorPresence.classList.remove("stage1-closing");
          doorPresence.classList.remove("stage2-closing");
          if (viewport) {
            viewport.classList.remove("stage1-mood");
            viewport.classList.remove("stage2-mood");
          }

          freddyBlackoutReleaseTimer = window.setTimeout(() => {
            freddyBlackoutReleaseTimer = null;
            doorStageClosing = false;
            body.classList.remove("freddy-blackout-release");
            setFreddyCameraRoom("classroom-b", { sound: false });
            updateNightDebug();
          }, FREDDY_BLACKOUT_OUT_MS);
        }, FREDDY_BLACKOUT_HOLD_MS);

        updateNightDebug();
      };

      const clearFreddyFakeRetreat = () => {
        if (freddyFakeRetreatTimer) {
          window.clearTimeout(freddyFakeRetreatTimer);
          freddyFakeRetreatTimer = null;
        }
        window.__daymoriFreddyFakeRetreatPending = false;
      };

      const playFreddyRecedingFootsteps = () => {
        if (GAMEPLAY_INTERACTION_AUDIO_ONLY) return;
        const ctx = getJumpscareAudioContext();
        if (!ctx) return;
        const now = ctx.currentTime;
        const master = ctx.createGain();
        master.gain.setValueAtTime(0.24, now);
        master.gain.linearRampToValueAtTime(0.0001, now + 2.9);
        master.connect(ctx.destination);
        [0, 0.42, 0.86, 1.32, 1.8, 2.3].forEach((offset, index) => {
          const foot = ctx.createOscillator();
          const gain = ctx.createGain();
          const filter = ctx.createBiquadFilter();
          foot.type = "triangle";
          foot.frequency.setValueAtTime(92 - index * 6, now + offset);
          foot.frequency.exponentialRampToValueAtTime(38, now + offset + 0.2);
          filter.type = "lowpass";
          filter.frequency.setValueAtTime(240 - index * 26, now + offset);
          gain.gain.setValueAtTime(0.0001, now + offset);
          gain.gain.linearRampToValueAtTime(Math.max(0.02, 0.14 - index * 0.02), now + offset + 0.024);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.3);
          foot.connect(filter).connect(gain).connect(master);
          foot.start(now + offset);
          foot.stop(now + offset + 0.34);
        });
      };

      const scheduleFreddyAmbushReturn = () => {
        clearFreddyFakeRetreat();
        window.__daymoriFreddyFakeRetreatPending = true;
        freddyFakeRetreatTimer = window.setTimeout(() => {
          freddyFakeRetreatTimer = null;
          window.__daymoriFreddyFakeRetreatPending = false;
          if (nightCleared || jumpscareActive || gameOverActive || !nightStarted) return;
          if (currentDoorStage !== 0 || doorStageClosing || activeFreddyRoute) return;
          freddyAmbushReturn = true;
          clearStageTimers();
          resetFlashlightProgress();
          enterStage2();
          updateNightDebug();
        }, FREDDY_FAKE_RETREAT_RETURN_MS);
      };

      const forceFreddyBackToIdle = (reason = "repelled") => {
        clearFlashlightTimers();
        clearFreddyRoute();
        if (reason !== "breach") {
          freddyRetreatedThisNight = true;
          syncRetreatSceneState();
          syncBonnieLeftPipePresence();
        }
        if ((currentDoorStage === 1 || currentDoorStage === 2) && !doorStageClosing) {
          blackoutStageThenIdle(currentDoorStage, reason);
          return;
        }
        clearStageTimers();
        setDoorStage(0);
        if (reason === "breach") {
          breachCount += 1;
        }
        setFreddyCameraRoom("classroom-b", { sound: false });
        updateNightDebug();
      };

      const resetHolderState = () => {
        holderStage = "room5-stage1";
        holderStageElapsedMs = 0;
        holderFlashCount = 0;
        holderUnlockedThisNight = false;
        holderRetreatedThisNight = false;
        syncHolderState();
        refreshHolderMonitor();
      };

      const setHolderStage = (nextStage) => {
        if (holderRetreatedThisNight || holderStage === nextStage) return;
        holderStage = nextStage;
        holderStageElapsedMs = 0;
        if (nextStage !== "cam3-ready") {
          holderFlashCount = 0;
        }
        syncHolderState();
        refreshHolderMonitor();
      };

      const repelHolder = () => {
        clearMonitorFlash();
        triggerHolderRepelMonitorFlash();
        holderRetreatedThisNight = false;
        holderStage = "room5-stage1";
        holderStageElapsedMs = 0;
        holderFlashCount = 0;
        syncHolderState();
        refreshHolderMonitor();
        updateNightDebug();
      };

      const triggerHolderJumpscare = () => {
        if (jumpscareActive || gameOverActive) return;

        setBonnieJumpscareFigureSource(HOLDER_JUMPSCARE_IMAGE, HOLDER_JUMPSCARE_IMAGE);
        hydrateDeferredImage(bonnieJumpscareFigure);
        stopPhoneCall();
        jumpscareActive = true;
        gameOverActive = false;
        nightCleared = true;
        breachCount += 1;
        holderRetreatedThisNight = true;
        syncHolderState();
        clearFreddyRoute();
        resetBonnieLeftPipeStage();
        resetChicaFinalStage();
        clearBonnieDirectKillTimer();
        clearBonnieAlarmTimers();
        setBonnieMaskState(false);
        bonnieActive = false;
        bonnieCurrentRoom = null;
        updateBonnieMapNoise();
        clearFlashlightTimers();
        clearMonitorFlash();
        stopStage2LightFlicker();

        body.classList.remove("freddy-blackout-active", "freddy-blackout-release", "tablet-open", "tablet-closing", "freddy-jumpscare-active");

    (function initFreddyUnevenJitter() {
      const stage2Freddy = document.querySelector(".door-stage2-open .door-stage2-freddy");
      if (!stage2Freddy) return;

      let jitterTimer = null;
      let pulseCount = 0;

      const randomRange = (min, max) => min + Math.random() * (max - min);

      const applyJitter = (el, prefix, maxX, maxY, maxTilt, scaleDelta, baseScale = 1) => {
        if (!el) return;

        const x = randomRange(-maxX, maxX);
        const y = randomRange(-maxY, maxY);
        const tilt = randomRange(-maxTilt, maxTilt);
        const scale = baseScale + randomRange(-scaleDelta, scaleDelta);
        const dur = randomRange(85, 245);

        el.style.setProperty(`--${prefix}-jitter-x`, `${x.toFixed(2)}px`);
        el.style.setProperty(`--${prefix}-jitter-y`, `${y.toFixed(2)}px`);
        el.style.setProperty(`--${prefix}-jitter-tilt`, `${tilt.toFixed(3)}deg`);
        el.style.setProperty(`--${prefix}-jitter-scale`, `${scale.toFixed(4)}`);
        el.style.setProperty(`--${prefix}-jitter-dur`, `${dur.toFixed(0)}ms`);
      };

      const nextDelay = () => {
        const burst = Math.random() < 0.42;
        if (burst) return randomRange(58, 135);
        return randomRange(150, 320);
      };

      const tick = () => {
        pulseCount += 1;
        const boost = pulseCount % 7 === 0 ? 1.42 : 1;

        applyJitter(stage2Freddy, "stage2", 1.06 * boost, 1.42 * boost, 0.44, 0.009, 1.05);

        jitterTimer = window.setTimeout(tick, nextDelay());
      };

      tick();

          jitterTimer = null;

        stage2Freddy.style.setProperty("--stage2-jitter-y", "0px");
        stage2Freddy.style.setProperty("--stage2-jitter-tilt", "0deg");

      });
    })();

        lowFilter.frequency.value = 180;
        lowGain.gain.setValueAtTime(0.0001, now);
        lowGain.gain.linearRampToValueAtTime(0.034, now + 0.018);
        lowGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.34);
        click.buffer = createNoiseBuffer(audioCtx, 0.06);
        clickGain.gain.setValueAtTime(0.0001, now);
        clickGain.gain.linearRampToValueAtTime(0.013, now + 0.008);
        clickGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
        low.connect(lowFilter);
        lowFilter.connect(lowGain);
        lowGain.connect(audioCtx.destination);
        click.connect(clickGain);
        clickGain.connect(audioCtx.destination);
        low.start(now);
        click.start(now);
        low.stop(now + 0.38);
        click.stop(now + 0.14);
      };

      const playMetalStressAccent = (strength = 0.4) => {
        if (!audioUnlockedByClick || !audioCtx || audioCtx.state === "closed") return;
        if (audioCtx.state === "suspended") {
          audioCtx.resume().catch(() => {});
        }
        const now = audioCtx.currentTime;
        const ring = audioCtx.createOscillator();
        const rumble = audioCtx.createOscillator();
        const filter = audioCtx.createBiquadFilter();
        const gain = audioCtx.createGain();
        ring.type = "triangle";
        rumble.type = "sine";
        ring.frequency.setValueAtTime(random(220, 320), now);
        ring.frequency.exponentialRampToValueAtTime(random(128, 182), now + 0.38);
        rumble.frequency.setValueAtTime(random(62, 84), now);
        rumble.frequency.exponentialRampToValueAtTime(random(44, 58), now + 0.42);
        filter.type = "bandpass";
        filter.frequency.value = random(360, 560);
        filter.Q.value = random(1.4, 2.4);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.linearRampToValueAtTime(random(0.005, 0.011) * strength, now + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.62);
        ring.connect(filter);
        rumble.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        ring.start(now);
        rumble.start(now);
        ring.stop(now + 0.68);
        rumble.stop(now + 0.72);
      };

      updateMenuAmbience = ({ fade = 0.56, surge = 0 } = {}) => {
        const bed = ensureMenuAmbientBed();
        if (!bed) return;
        const introActive = body.classList.contains("intro-sequence-open");
        const menuSceneActive = body.classList.contains("main-menu-open");
        if (!menuSceneActive) {
          roleAfterglowUntil = 0;
          rampNodeGain(bed.humGain, 0.0001, Math.max(0.06, fade));
          rampNodeGain(bed.buzzGain, 0.0001, Math.max(0.06, fade * 0.7));
          rampNodeGain(bed.metalGain, 0.0001, Math.max(0.06, fade));
          return;
        }
        if (introActive) {
          roleAfterglowUntil = 0;
          const pulse = getMenuVolumePulse(true);
          rampNodeGain(bed.humGain, 0.0048 + (pulse * 0.0106), Math.max(0.2, fade));
          rampNodeGain(bed.buzzGain, 0.0009 + (pulse * 0.0042), Math.max(0.18, fade));
          rampNodeGain(bed.metalGain, 0.0003 + (pulse * 0.0019), Math.max(0.2, fade));
          bed.buzzFilter.frequency.setTargetAtTime(660 + (pulse * 180), audioCtx.currentTime, 0.18);
          bed.metalFilter.frequency.setTargetAtTime(420 + (pulse * 90), audioCtx.currentTime, 0.3);
          return;
        }
        const pulse = getMenuVolumePulse(false);
        const tailKey = Date.now() < roleAfterglowUntil ? roleAfterglowKey : currentRole.key;
        const tailStrength = getRoleTailStrength(tailKey);
        const foxyPressure = menuScreen.classList.contains("foxy-pressure") ? 1 : 0;
        let humTarget = 0.0088;
        let buzzTarget = 0.0028;
        let metalTarget = 0.0011;

        if (tailKey === "foxy") {
          humTarget += 0.004 + (tailStrength * 0.0034);
          buzzTarget += 0.0011 + (tailStrength * 0.0012);
          metalTarget += 0.0005;
        } else if (tailKey === "bonnie") {
          humTarget += 0.0014;
          buzzTarget += 0.001;
          metalTarget += 0.0013 + (tailStrength * 0.0014);
        } else if (tailKey === "freddy") {
          humTarget += 0.0024 + (tailStrength * 0.0014);
          buzzTarget += 0.0006;
          metalTarget += 0.0005;
        }

        if (watching) humTarget += 0.0011;
        if (switching) buzzTarget += 0.0011;
        if (foxyPressure) {
          humTarget += 0.0028;
          buzzTarget += 0.0012;
        }

        humTarget += surge * 0.0013;
        buzzTarget += surge * 0.0009;
        metalTarget += surge * 0.0004;

        const pulseScale = 0.45 + (pulse * 1.1);
        humTarget *= pulseScale;
        buzzTarget *= 0.5 + (pulse * 0.92);
        metalTarget *= 0.42 + (pulse * 0.86);

        rampNodeGain(bed.humGain, humTarget, Math.max(0.22, fade));
        rampNodeGain(bed.buzzGain, buzzTarget, Math.max(0.2, fade * 0.85));
        rampNodeGain(bed.metalGain, metalTarget, Math.max(0.24, fade));
        bed.buzzFilter.frequency.setTargetAtTime(700 + (pulse * 160) + (surge * 90) + (foxyPressure * 60), audioCtx.currentTime, 0.2);
        bed.metalFilter.frequency.setTargetAtTime((tailKey === "bonnie" ? 540 : 450) + (pulse * 70) + (tailStrength * 40), audioCtx.currentTime, 0.42);
      };

      getMenuVolumePulse = (intro = false) => {
        const nowSec = Date.now() / 1000;
        const primary = 0.5 + (0.5 * Math.sin(nowSec * (intro ? 1.42 : 0.98)));
        const secondary = 0.5 + (0.5 * Math.sin((nowSec * (intro ? 0.74 : 0.48)) + (intro ? 0.6 : 1.8)));
        return Math.min(1.08, Math.max(0.18, 0.16 + (primary * 0.66) + (secondary * 0.34)));
      };

      syncMenuLampAudio = (lampOpacity, lampBrightness, shadowAlpha) => {
        if (!body.classList.contains("main-menu-open") || body.classList.contains("intro-sequence-open")) return;
        const bed = ensureMenuAmbientBed();
        if (!bed) return;
        const darkness = Math.max(0, 0.46 - lampOpacity);
        const shadowBoost = Math.max(0, shadowAlpha - 0.1);
        const buzzTarget = 0.0028 + (darkness * 0.012) + (shadowBoost * 0.006) + (currentRole.key === "foxy" ? 0.0008 : 0);
        const humTarget = 0.0088 + (shadowBoost * 0.004) + (currentRole.key === "foxy" ? 0.0012 : 0);
        rampNodeGain(bed.buzzGain, Math.max(bed.buzzGain.gain.value, Math.min(0.01, buzzTarget)), 0.24);
        rampNodeGain(bed.humGain, Math.max(0.0074, Math.min(0.014, humTarget)), 0.32);
        bed.buzzFilter.frequency.setTargetAtTime(740 + Math.max(0, lampBrightness - 0.92) * 150, audioCtx.currentTime, 0.2);
      };

      pulseMediaArtifacts = (strength = 1, options = {}) => {
        if (!isMenuOpen()) return;
        const holdMs = typeof options.holdMs === "number" ? options.holdMs : 220;
        const textStrength = options.text === false ? 0 : strength;
        const chromaStrength = options.chroma === false ? 0 : strength;
        menuScreen.classList.add("media-hit");
        if (textStrength > 0) {
          menuTextEcho.classList.add("is-flicker");
        }
        menuLayout.style.setProperty("--menu-noise-burst", (0.04 + (strength * 0.08)).toFixed(3));
        menuLayout.style.setProperty("--menu-crt-burst", (0.03 + (strength * 0.07)).toFixed(3));
        menuLayout.style.setProperty("--menu-vhold-shift", `${random(-1.6, 1.8) * strength}px`);
        menuLayout.style.setProperty("--menu-crt-brightness-hit", (0.04 + (strength * 0.08)).toFixed(3));
        menuLayout.style.setProperty("--menu-crt-contrast-hit", (0.02 + (strength * 0.04)).toFixed(3));
        menuLayout.style.setProperty("--menu-noise-brightness-hit", (0.02 + (strength * 0.05)).toFixed(3));
        menuLayout.style.setProperty("--menu-noise-contrast-hit", (0.03 + (strength * 0.05)).toFixed(3));
        menuLayout.style.setProperty("--menu-chroma-opacity", chromaStrength > 0 ? (0.03 + (chromaStrength * 0.07)).toFixed(3) : "0");
        menuLayout.style.setProperty("--menu-text-opacity", textStrength > 0 ? (0.025 + (textStrength * 0.055)).toFixed(3) : "0");
        menuLayout.style.setProperty("--menu-wall-shadow-boost", (0.02 + (strength * 0.05)).toFixed(3));
        menuTextEcho.style.setProperty("--menu-text-x", `${Math.round(random(-2, 3) * strength)}px`);
        menuTextEcho.style.setProperty("--menu-text-y", `${Math.round(random(-1, 2) * strength)}px`);
        menuTextEcho.style.setProperty("--menu-text-skew", `${random(-0.75, 0.75).toFixed(2)}deg`);

        later(() => {
          menuScreen.classList.remove("media-hit");
          menuTextEcho.classList.remove("is-flicker");
          menuLayout.style.setProperty("--menu-noise-burst", "0");
          menuLayout.style.setProperty("--menu-crt-burst", "0");
          menuLayout.style.setProperty("--menu-vhold-shift", "0px");
          menuLayout.style.setProperty("--menu-crt-brightness-hit", "0");
          menuLayout.style.setProperty("--menu-crt-contrast-hit", "0");
          menuLayout.style.setProperty("--menu-noise-brightness-hit", "0");
          menuLayout.style.setProperty("--menu-noise-contrast-hit", "0");
          menuLayout.style.setProperty("--menu-chroma-opacity", "0");
          menuLayout.style.setProperty("--menu-text-opacity", "0");
          menuLayout.style.setProperty("--menu-wall-shadow-boost", "0");
          menuTextEcho.style.setProperty("--menu-text-x", "0px");
          menuTextEcho.style.setProperty("--menu-text-y", "0px");
          menuTextEcho.style.setProperty("--menu-text-skew", "0deg");
        }, holdMs);
      };

      triggerRoleAfterglow = (roleKey) => {
        roleAfterglowKey = roleKey;
        roleAfterglowUntil = Date.now() + (roleKey === "freddy" ? 2200 : 1700);
        updateMenuAmbience({ fade: 0.34, surge: roleKey === "foxy" ? 0.45 : roleKey === "bonnie" ? 0.3 : 0.18 });
        if (roleKey === "bonnie") {
          playMetalStressAccent(0.54);
          later(() => {
            if (isMenuOpen()) playMetalStressAccent(0.34);
          }, 320);
        }
        if (roleKey === "foxy") {
          pulseMediaArtifacts(1.08, { text: true, chroma: true, holdMs: 260 });
        } else if (roleKey === "freddy") {
          pulseMediaArtifacts(0.54, { text: false, chroma: true, holdMs: 180 });
        }
      };

      window.__daymoriMenuFeedback = {
        unlockAudio,
        playSelectionClick: playMenuSelectionClick,
        playConfirmThump: playMenuConfirmThump,
        exciteLampFromRightSide,
        pulseMediaArtifacts,
        silenceAmbience: (fade = 0.14) => updateMenuAmbience({ fade }),
        suspendContext: () => {
          updateMenuAmbience({ fade: 0.08 });
          if (!audioCtx || audioCtx.state !== "running") return;
          window.setTimeout(() => {
            if (!audioCtx || audioCtx.state !== "running" || isMenuOpen()) return;
            void audioCtx.suspend().catch(() => {});
          }, 90);
        },
        getDebugState: () => ({
          hasContext: Boolean(audioCtx),
          contextState: audioCtx ? audioCtx.state : "missing",
          unlockedByClick: audioUnlockedByClick,
          menuOpen: isMenuOpen(),
          hasAmbientBed: Boolean(menuAmbientNodes),
          humGain: menuAmbientNodes ? Number(menuAmbientNodes.humGain.gain.value.toFixed(4)) : 0,
          buzzGain: menuAmbientNodes ? Number(menuAmbientNodes.buzzGain.gain.value.toFixed(4)) : 0,
          metalGain: menuAmbientNodes ? Number(menuAmbientNodes.metalGain.gain.value.toFixed(4)) : 0,
        }),
      };

      const playSwitchCurrentSound = () => {
        if (!audioUnlockedByClick || !audioCtx || audioCtx.state === "closed") return;
        if (audioCtx.state === "suspended") {
          audioCtx.resume().catch(() => {});
        }

        const now = audioCtx.currentTime;
        const gain = audioCtx.createGain();
        const osc = audioCtx.createOscillator();
        const undercurrent = audioCtx.createOscillator();
        const filter = audioCtx.createBiquadFilter();
        osc.type = "triangle";
        undercurrent.type = "sawtooth";
        filter.type = "lowpass";
        filter.frequency.setValueAtTime(random(150, 210), now);
        filter.frequency.linearRampToValueAtTime(random(90, 130), now + random(0.16, 0.28));
        osc.frequency.setValueAtTime(random(34, 48), now);
        osc.frequency.exponentialRampToValueAtTime(random(24, 34), now + random(0.18, 0.32));
        undercurrent.frequency.setValueAtTime(random(58, 76), now);
        undercurrent.frequency.linearRampToValueAtTime(random(42, 58), now + random(0.12, 0.24));
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.linearRampToValueAtTime(random(0.018, 0.034), now + 0.018);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + random(0.22, 0.38));
        osc.connect(filter);
        undercurrent.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        undercurrent.start(now);
        osc.stop(now + 0.42);
        undercurrent.stop(now + 0.42);
      };

      const playWaterDripSound = () => {
        if (!audioUnlockedByClick || !audioCtx || audioCtx.state === "closed") return;
        if (audioCtx.state === "suspended") {
          audioCtx.resume().catch(() => {});
        }

        const now = audioCtx.currentTime;
        const drop = audioCtx.createOscillator();
        const hollow = audioCtx.createOscillator();
        const filter = audioCtx.createBiquadFilter();
        const delay = audioCtx.createDelay(0.28);
        const dry = audioCtx.createGain();
        const echo = audioCtx.createGain();
        drop.type = "sine";
        hollow.type = "triangle";
        filter.type = "bandpass";
        filter.frequency.value = random(420, 620);
        filter.Q.value = random(5, 8);
        delay.delayTime.value = random(0.08, 0.18);
        dry.gain.setValueAtTime(0.0001, now);
        dry.gain.linearRampToValueAtTime(random(0.018, 0.034), now + 0.006);
        dry.gain.exponentialRampToValueAtTime(0.0001, now + random(0.16, 0.28));
        echo.gain.value = random(0.18, 0.32);
        drop.frequency.setValueAtTime(random(520, 820), now);
        drop.frequency.exponentialRampToValueAtTime(random(160, 260), now + random(0.07, 0.13));
        hollow.frequency.setValueAtTime(random(170, 260), now);
        hollow.frequency.exponentialRampToValueAtTime(random(74, 110), now + random(0.12, 0.22));
        drop.connect(filter);
        hollow.connect(filter);
        filter.connect(dry);
        dry.connect(audioCtx.destination);
        dry.connect(delay);
        delay.connect(echo);
        echo.connect(audioCtx.destination);
        drop.start(now);
        hollow.start(now);
        drop.stop(now + 0.32);
        hollow.stop(now + 0.36);
      };

      const chooseTransition = (forceGlitch = false) => {
        if (forceGlitch) return "glitch";
        return pickOne(["glitch", "blackout", "ghost"]);
      };

      const maybeErrorFlashRole = (finalRole, done) => {
        if (!chance(0.05)) {
          done();
          return;
        }
        const wrong = weightedPick(finalRole.key);
        character.style.setProperty("--character-image", cssImage(wrong));
        character.classList.add("is-glitching");
        later(() => {
          character.classList.remove("is-glitching");
          done();
        }, 50);
      };

      const glitchTransition = (targetRole, done) => {
        switching = true;
        pulseEnvironment(1.2);
        const flashes = Math.floor(random(1, 3));
        let step = 0;
        character.classList.add("is-glitching");

        const tick = () => {
          if (step >= flashes) {
            maybeErrorFlashRole(targetRole, () => {
              setCharacter(targetRole);
              character.classList.remove("is-glitching");
              switching = false;
              done();
            });
            return;
          }
          const temp = weightedPick(currentRole.key);
          character.style.setProperty("--character-image", cssImage(temp));
          character.style.setProperty("--character-x", `${Math.round(random(-1, 2))}px`);
          character.style.setProperty("--character-y", `${Math.round(random(-1, 2))}px`);
          step += 1;
          later(tick, random(90, 140));
        };

        tick();
      };

      const blackoutTransition = (targetRole, done) => {
        switching = true;
        pulseEnvironment(1);
        character.classList.add("is-blackout");
        later(() => {
          maybeErrorFlashRole(targetRole, () => {
            setCharacter(targetRole);
            character.classList.remove("is-blackout");
            switching = false;
            done();
          });
        }, 130);
      };

      const ghostTransition = (targetRole, done) => {
        switching = true;
        pulseEnvironment(0.86);
        ghost.style.backgroundImage = cssImage(currentRole);
        ghost.classList.add("is-visible");
        character.style.setProperty("--character-x", "2px");
        character.style.setProperty("--character-y", "1px");
        maybeErrorFlashRole(targetRole, () => {
          setCharacter(targetRole);
          later(() => {
            ghost.classList.remove("is-visible");
            character.style.setProperty("--character-x", "0px");
            character.style.setProperty("--character-y", "0px");
            switching = false;
            done();
          }, 210);
        });
      };

      const fakeSwitch = (done) => {
        switching = true;
        pulseEnvironment(0.65);
        const fakeRole = weightedPick(currentRole.key);
        character.classList.add("is-glitching");
        ghost.style.backgroundImage = cssImage(fakeRole);
        ghost.classList.add("is-visible", "is-fake");
        later(() => {
          ghost.classList.remove("is-visible", "is-fake");
          character.classList.remove("is-glitching");
          switching = false;
          done();
        }, 220);
      };

      const runTransition = (targetRole, forcedType = "") => {
        if (!isMenuOpen() || switching) return;

        const finish = () => {
          lastSwitchAt = Date.now();
          playSwitchCurrentSound();
          if (targetRole.key === "foxy" && chance(0.3)) {
            later(() => runTransition(weightedPick("foxy"), "glitch"), random(120, 420));
          }
        };

        const type = forcedType || chooseTransition(Date.now() - lastSwitchAt > 10000);
        if (type === "glitch") glitchTransition(targetRole, finish);
        else if (type === "blackout") blackoutTransition(targetRole, finish);
        else ghostTransition(targetRole, finish);
      };

      const scheduleNextSwitch = () => {
        if (!isMenuOpen()) return;
        let delay = nextSwitchShortened ? random(2400, 5200) : random(6400, 18000);
        nextSwitchShortened = false;
        if (chance(0.12)) delay *= random(0.7, 0.86);
        if (chance(0.24)) delay += 1800;

        later(() => {
          if (!isMenuOpen()) return;
          const forceGlitch = Date.now() - lastSwitchAt > 10000;
          const fakeChance = Date.now() < stillnessBonusUntil ? 0.18 : 0.06;
          if (chance(fakeChance)) {
            fakeSwitch(scheduleNextSwitch);
            return;
          }
          runTransition(weightedPick(currentRole.key), forceGlitch ? "glitch" : "");
          scheduleNextSwitch();
        }, delay);
      };

      const scheduleMemorySlip = () => {
        later(() => {
          if (!isMenuOpen()) return;
          const candidates = history.filter((role) => role.key !== currentRole.key);
          if (candidates.length) {
            flashScreen("normal", 44);
            pulseEnvironment(0.82);
            setCharacter(pickOne(candidates), { skipHistory: true });
            lastSwitchAt = Date.now();
          }
          scheduleMemorySlip();
        }, random(15000, 30000));
      };

      const scheduleEdgeHallucination = () => {
        later(() => {
          if (!isMenuOpen()) return;
          const role = weightedPick("");
          edgeGhost.style.backgroundImage = cssImage(role);
          edgeGhost.classList.toggle("is-left", chance(0.5));
          edgeGhost.classList.toggle("is-right", !edgeGhost.classList.contains("is-left"));
          edgeGhost.classList.add("is-visible");
          later(() => edgeGhost.classList.remove("is-visible", "is-left", "is-right"), 30);
          scheduleEdgeHallucination();
        }, random(1800, 7600));
      };

      const scheduleErrorFrame = () => {
        later(() => {
          if (!isMenuOpen()) return;
          const mode = pickOne(["black", "over", "close"]);
          if (mode === "black") {
            flashScreen("black", random(16, 50));
          } else {
            character.classList.add("is-flash");
            if (mode === "close") character.style.setProperty("--character-pressure", "1.2");
            later(() => {
              character.classList.remove("is-flash");
              character.style.setProperty("--character-pressure", "1");
            }, random(16, 50));
          }
          scheduleErrorFrame();
        }, random(20000, 40000));
      };

      const scheduleWaterDripSound = () => {
        later(() => {
          if (!isMenuOpen()) return;
          playWaterDripSound();
          if (chance(0.32)) {
            later(() => {
              if (isMenuOpen()) playWaterDripSound();
            }, random(120, 420));
          }
          scheduleWaterDripSound();
        }, random(1300, 4800));
      };

      const scheduleAmbiencePulse = () => {
        later(() => {
          if (!audioUnlockedByClick || !audioCtx || audioCtx.state === "closed") {
            scheduleAmbiencePulse();
            return;
          }
          if (body.classList.contains("main-menu-open")) {
            updateMenuAmbience({ fade: body.classList.contains("intro-sequence-open") ? 0.18 : 0.24 });
          }
          scheduleAmbiencePulse();
        }, 280);
      };

      const scheduleLampFlicker = () => {
        const roleIntensity = currentRole.key === "foxy" ? 1.28 : currentRole.key === "bonnie" ? 1.12 : currentRole.key === "chica" ? 0.94 : 1;
        const activePressure = menuScreen.classList.contains("foxy-pressure") || switching;
        const shouldOutage = chance(activePressure ? 0.26 : 0.14);
        later(() => {
          if (!isMenuOpen()) return;
          const settledState = buildSettledLampState(currentRole.key);

          if (shouldOutage) {
            menuScreen.classList.add("lamp-outage");
            pulseEnvironment(activePressure ? 0.82 : 0.58);
            pulseMediaArtifacts(activePressure ? 1.24 : 0.92, { text: true, chroma: true, holdMs: 260 });
            applyLampState({
              lampOpacity: random(0.02, 0.06),
              lampBrightness: random(0.66, 0.78),
              doorBrightness: random(0.68, 0.8),
              doorContrast: random(1.1, 1.18),
              shadowAlpha: random(0.36, 0.5),
            });

            later(() => {
              if (!isMenuOpen()) return;
              menuScreen.classList.remove("lamp-outage");
              updateMenuAmbience({ fade: 0.28, surge: 0.48 });
              applyLampState({
                lampOpacity: random(0.12, 0.2),
                lampBrightness: random(0.84, 0.94),
                doorBrightness: random(0.82, 0.91),
                doorContrast: random(1.04, 1.1),
                shadowAlpha: random(0.2, 0.28),
              });
            }, random(820, 1280));

            later(() => {
              if (!isMenuOpen()) return;
              applyLampState(settledState);
            }, random(1680, 2500));

            scheduleLampFlicker();
            return;
          }

          const brightLift = chance(activePressure ? 0.34 : 0.22);
          applyLampState({
            lampOpacity: Math.max(0.12, settledState.lampOpacity - random(0.08, 0.18) * roleIntensity),
            lampBrightness: Math.max(0.78, settledState.lampBrightness - random(0.1, 0.2) * roleIntensity),
            doorBrightness: Math.max(0.8, settledState.doorBrightness - random(0.05, 0.11) * roleIntensity),
            doorContrast: Math.min(1.16, settledState.doorContrast + random(0.02, 0.05) * roleIntensity),
            shadowAlpha: Math.min(0.34, settledState.shadowAlpha + random(0.06, 0.14) * roleIntensity),
          });
          pulseMediaArtifacts(brightLift ? 0.52 : 0.28, { text: false, chroma: brightLift, holdMs: brightLift ? 170 : 120 });

          later(() => {

        const now = tabletAudioCtx.currentTime;

        const carrier = tabletAudioCtx.createOscillator();
        const carrierFilter = tabletAudioCtx.createBiquadFilter();
        const carrierGain = tabletAudioCtx.createGain();
        carrier.type = "square";
        carrier.frequency.setValueAtTime(880 + (numericSeed * 9), now);
        carrier.frequency.linearRampToValueAtTime(1160 + (numericSeed * 11), now + 0.08);
        carrier.frequency.linearRampToValueAtTime(980 + (numericSeed * 7), now + 0.19);
        carrierFilter.type = "bandpass";
        carrierFilter.frequency.setValueAtTime(1380, now);
        carrierFilter.Q.value = 1.5;
        carrierGain.gain.setValueAtTime(0.0001, now);
        carrierGain.gain.linearRampToValueAtTime(0.026, now + 0.012);
        carrierGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
        carrier.connect(carrierFilter).connect(carrierGain).connect(tabletAudioMaster);
        carrier.start(now);
        carrier.stop(now + 0.24);

        const staticBurst = tabletAudioCtx.createBufferSource();
        const staticFilter = tabletAudioCtx.createBiquadFilter();
        const staticGain = tabletAudioCtx.createGain();
        staticBurst.buffer = createTabletNoiseBuffer(0.12);
        staticFilter.type = "bandpass";
        staticFilter.frequency.setValueAtTime(2200, now);
        staticFilter.Q.value = 0.7;
        staticGain.gain.setValueAtTime(0.0001, now);
        staticGain.gain.linearRampToValueAtTime(0.016, now + 0.008);
        staticGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.13);
        staticBurst.connect(staticFilter).connect(staticGain).connect(tabletAudioMaster);
        staticBurst.start(now);
        staticBurst.stop(now + 0.16);

        [0.062, 0.132].forEach((offset, index) => {
          const chirp = tabletAudioCtx.createOscillator();
          const chirpGain = tabletAudioCtx.createGain();
          chirp.type = "sine";
          chirp.frequency.setValueAtTime(1260 + (index * 110) + (numericSeed * 4), now + offset);
          chirp.frequency.exponentialRampToValueAtTime(820 + (index * 60), now + offset + 0.05);
          chirpGain.gain.setValueAtTime(0.0001, now + offset);
          chirpGain.gain.linearRampToValueAtTime(0.016, now + offset + 0.01);
          chirpGain.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.065);
          chirp.connect(chirpGain).connect(tabletAudioMaster);
          chirp.start(now + offset);
          chirp.stop(now + offset + 0.075);

        if (typeof window.__daymoriWarmSafetyRoomAssets === "function") {
          window.__daymoriWarmSafetyRoomAssets("tablet");
        }
        if (typeof window.__daymoriWarmMonitorRoomAssets === "function") {
          window.__daymoriWarmMonitorRoomAssets(currentRoom, true);
        }
        playTabletFlipSound("open");
        triggerSignalCut();
        if (currentRoom === "room8") {
          startRoom8Observation();
        }
        window.__daymoriMonitorRoomState = {
          room: currentRoom,
          roomClass: roomMeta[currentRoom]?.roomClass || currentRoom,
          tabletOpen: true,
        };
        syncRoom(currentRoom, { signalCut: false });
        scheduleFakeSignal();
        scheduleMonitorPhantom();
      };

      const closeTablet = () => {
        if (!tabletOpen) return;
        tabletOpen = false;
        if (closeAnimationTimer) {
          window.clearTimeout(closeAnimationTimer);
          closeAnimationTimer = null;
        }
        stopRoom8Observation();
        stopFakeSignal();
        stopMonitorPhantom();
        window.__daymoriMonitorRoomState = {
          room: currentRoom,
          roomClass: roomMeta[currentRoom]?.roomClass || currentRoom,
          tabletOpen: false,
        };
        playTabletFlipSound("close");
        body.classList.remove("tablet-open");
        body.classList.add("tablet-closing");
        closeAnimationTimer = window.setTimeout(() => {
          finalizeTabletClose();
        }, TABLET_CLOSE_ANIMATION_MS);
      };

      window.__daymoriForceCloseTabletForPower = closeTablet;
      window.__daymoriTriggerFakeMonitorSignal = triggerFakeSignal;
      window.__daymoriTriggerMonitorPhantom = triggerMonitorPhantom;

      toggleBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        if (tabletOpen) {
          closeTablet();
        } else {
          openTablet();
        }
      });

      if (closeBtn) {
        closeBtn.addEventListener("click", (event) => {
          event.stopPropagation();
          closeTablet();
        });
      }

      if (tabletPanel) {
        tabletPanel.addEventListener("transitionend", (event) => {
          if (!tabletOpen && event.propertyName === "transform") {
            finalizeTabletClose();
          }
        });
      }

      mapButtons.forEach((btn) => {
        btn.addEventListener("click", (event) => {
          event.stopPropagation();
          syncRoom(btn.dataset.room || "classroom-b", { signalCut: true });
        });
      });

      if (pipelineMapToggle) {
        pipelineMapToggle.addEventListener("click", (event) => {
          event.stopPropagation();
          syncMapView(currentMapView === "pipeline" ? "ground" : "pipeline", { signalCut: false });
        });
      }

      window.addEventListener("keydown", (event) => {
        if (!tabletOpen) return;
        if (event.key === "Escape" || event.key === "Tab") {
          event.preventDefault();
          closeTablet();
        }
      });

      window.addEventListener("click", () => {
        if (!canOpenTablet() && tabletOpen) {
          closeTablet();
        }
      });

      window.addEventListener("beforeunload", () => {
        if (signalCutTimer) {
          window.clearTimeout(signalCutTimer);
          signalCutTimer = null;
        }
        if (cameraAcquireTimer) {
          window.clearTimeout(cameraAcquireTimer);
          cameraAcquireTimer = null;
        }
        if (cameraAcquireStatusTimer) {
          window.clearTimeout(cameraAcquireStatusTimer);
          cameraAcquireStatusTimer = null;
        }
        if (room4VerdictTimer) {
          window.clearTimeout(room4VerdictTimer);
          room4VerdictTimer = null;
        }
        if (room8IntakeTimer) {
          window.clearTimeout(room8IntakeTimer);
          room8IntakeTimer = null;
        }
        if (room6CollapseTimer) {
          window.clearTimeout(room6CollapseTimer);
          room6CollapseTimer = null;
        }
        if (room4FreddyRevealTimer) {
          window.clearTimeout(room4FreddyRevealTimer);
          room4FreddyRevealTimer = null;
        }
        if (room8FreddyRevealTimer) {
          window.clearTimeout(room8FreddyRevealTimer);
          room8FreddyRevealTimer = null;
        }
        if (room6FreddyRevealTimer) {
          window.clearTimeout(room6FreddyRevealTimer);
          room6FreddyRevealTimer = null;
        }
        if (room7FreddyRevealTimer) {
          window.clearTimeout(room7FreddyRevealTimer);
          room7FreddyRevealTimer = null;
        }
        if (freddyDepartureFlashTimer) {
          window.clearTimeout(freddyDepartureFlashTimer);
          freddyDepartureFlashTimer = null;
        }
        if (fakeSignalTimer) {
          window.clearTimeout(fakeSignalTimer);
          fakeSignalTimer = null;
        }
        if (fakeSignalClearTimer) {
          window.clearTimeout(fakeSignalClearTimer);
          fakeSignalClearTimer = null;
        }
        if (room7PlayTimer) {
          window.clearTimeout(room7PlayTimer);
          room7PlayTimer = null;
        }
        if (room3InventoryTimer) {
          window.clearTimeout(room3InventoryTimer);
          room3InventoryTimer = null;
        }
        stopRoom8Observation();
        if (closeAnimationTimer) {
          window.clearTimeout(closeAnimationTimer);
          closeAnimationTimer = null;
        }
        delete window.__daymoriPlayRoom4FlashSound;
        delete window.__daymoriPlayRoom8FlashSound;
        delete window.__daymoriPlayRoom6FlashSound;
        delete window.__daymoriPlayRoom7FlashSound;
        delete window.__daymoriPlayRoom3FlashSound;
        delete window.__daymoriSetFreddyMonitorRoom;
        delete window.__daymoriForceCloseTabletForPower;
        delete window.__daymoriTriggerFakeMonitorSignal;
        delete window.__daymoriFakeSignalState;
        tabletOpen = false;
        body.classList.remove("tablet-open");
        body.classList.remove("tablet-closing");
        tabletScreen.setAttribute("aria-hidden", "true");
        if (tabletAudioCtx) {
          void tabletAudioCtx.close().catch(() => {
          });
        }
      });

      syncRoom(currentRoom);
      setFreddyMonitorRoom(null, { sound: false });
      syncMapView(currentMapView);
    })();

    (function initDemoPolishRuntime() {
      const body = document.body;
      if (!body) return;

      let dreadTimer = null;
      let dreadClearTimer = null;
      let perfFrameCount = 0;
      let perfSlowFrames = 0;
      let perfTotalDelta = 0;
      let perfLastFrame = 0;
      const random = (min, max) => min + Math.random() * (max - min);

      const setPerformanceSoftened = (enabled, reason) => {
        body.classList.toggle("performance-soften", enabled);
        window.__daymoriDemoPolishState = {
          ...(window.__daymoriDemoPolishState || {}),
          performanceSoftened: enabled,
          performanceReason: reason || "manual",
        };
      };

      const shouldStartSoft = () => {
        if (!window.matchMedia) return false;
        return window.matchMedia("(pointer: coarse), (max-width: 1180px)").matches;
      };

      const samplePerformance = (now) => {
        if (!perfLastFrame) {
          perfLastFrame = now;
          window.requestAnimationFrame(samplePerformance);
          return;
        }
        const delta = Math.min(160, now - perfLastFrame);
        perfLastFrame = now;
        perfFrameCount += 1;
        perfTotalDelta += delta;
        if (delta > 30) perfSlowFrames += 1;
        if (perfFrameCount < 100) {
          window.requestAnimationFrame(samplePerformance);
          return;
        }
        const averageDelta = perfTotalDelta / Math.max(1, perfFrameCount);
        const shouldSoften = shouldStartSoft() || averageDelta > 22 || perfSlowFrames > 14;
        setPerformanceSoftened(shouldSoften, shouldSoften ? `avg:${averageDelta.toFixed(1)} slow:${perfSlowFrames}` : "stable");
      };

      const isNightRunning = () => {
        const state = window.__daymoriFreddyNightState;
        return Boolean(state && state.started && !state.cleared && !state.gameOver)
          && !body.classList.contains("main-menu-open")
          && !body.classList.contains("intro-sequence-open")
          && !body.classList.contains("freddy-jumpscare-active")
          && !body.classList.contains("freddy-game-over")
          && !body.classList.contains("night-complete-active");
      };

      const triggerDreadPulse = () => {
        if (!isNightRunning()) return;
        if (dreadClearTimer) {
          window.clearTimeout(dreadClearTimer);
          dreadClearTimer = null;
        }
        body.classList.remove("demo-dread-pulse");
        void body.offsetWidth;
        body.classList.add("demo-dread-pulse");
        window.__daymoriDemoPolishState = {
          ...(window.__daymoriDemoPolishState || {}),
          lastDreadPulseAt: Date.now(),
          dreadCue: "ambient pressure pulse",
        };
        dreadClearTimer = window.setTimeout(() => {
          body.classList.remove("demo-dread-pulse");
          dreadClearTimer = null;
        }, 520 + Math.round(random(0, 260)));
      };

      const scheduleDreadPulse = () => {
        if (dreadTimer) return;
        const state = window.__daymoriFreddyNightState || {};
        const pressure = state.doorStage > 0 || state.freddyRoute ? 1 : 0;
        const delay = pressure ? random(5600, 9800) : random(11000, 19000);
        dreadTimer = window.setTimeout(() => {
          dreadTimer = null;
          if (isNightRunning() && Math.random() < (pressure ? 0.72 : 0.46)) {
            triggerDreadPulse();
          }
          scheduleDreadPulse();
        }, delay);
      };

      const syncVisibility = () => {
        body.classList.toggle("runtime-paused", document.hidden);
      };

      window.__daymoriTriggerDemoDreadPulse = triggerDreadPulse;
      if (shouldStartSoft()) {
        setPerformanceSoftened(true, "mobile-default");
      }
      if (window.requestAnimationFrame) {
        window.requestAnimationFrame(samplePerformance);
      }
      document.addEventListener("visibilitychange", syncVisibility);
      syncVisibility();
      scheduleDreadPulse();

      window.addEventListener("beforeunload", () => {
        if (dreadTimer) {
          window.clearTimeout(dreadTimer);
          dreadTimer = null;
        }
        if (dreadClearTimer) {
          window.clearTimeout(dreadClearTimer);
          dreadClearTimer = null;
        }
        document.removeEventListener("visibilitychange", syncVisibility);
        delete window.__daymoriTriggerDemoDreadPulse;
      });
    })();

    (function initDemoDirectorRuntime() {
      const body = document.body;
      const cameraFeed = document.getElementById("cameraFeed");
      const nightCompleteLayer = document.getElementById("nightCompleteLayer");
      const freddyJumpscareLayer = document.getElementById("freddyJumpscareLayer");
      if (!body) return;

      const mapButtons = Array.from(document.querySelectorAll(".map-room.is-live[data-room]"));
      let directorTimer = null;
      let lastResultSignature = "";
      let lastGameOverSignature = "";
      let lastKnownThreatRoom = "";
      let lastObservedThreatRoom = "";
      let tabletOpenStartedAt = 0;

      const ensureNightResultPanel = () => {
        if (!nightCompleteLayer) return null;
        let panel = nightCompleteLayer.querySelector(".demo-night-result-panel");
        if (panel) return panel;
        panel = document.createElement("div");
        panel.className = "demo-night-result-panel";
        panel.setAttribute("aria-label", "Night result");
        nightCompleteLayer.appendChild(panel);
        return panel;
      };

      const setResultStat = (panel, label, value) => {
        const stat = document.createElement("div");
        stat.className = "demo-night-result-chip";
        stat.innerHTML = `<span>${label}</span><strong>${value}</strong>`;
        panel.appendChild(stat);
      };

      const roomLabel = (roomKey) => {
        const labels = {
          "classroom-b": "ROOM 3",
          room3: "ROOM 3",
          room4: "ROOM 4",
          room6: "ROOM 6",
          room7: "ROOM 7",
          room8: "ROOM 8",
          "safe-room": "SAFE ROOM",
        };
        return labels[roomKey] || "--";
      };

      const ensureGameOverReport = () => {
        if (!freddyJumpscareLayer) return null;
        let panel = freddyJumpscareLayer.querySelector(".demo-gameover-report");
        if (panel) return panel;
        panel = document.createElement("div");
        panel.className = "demo-gameover-report";
        panel.setAttribute("aria-label", "Incident report");
        const retryPanel = freddyJumpscareLayer.querySelector(".freddy-retry-panel");
        freddyJumpscareLayer.insertBefore(panel, retryPanel || null);
        return panel;
      };

      const setGameOverStat = (panel, label, value) => {
        const stat = document.createElement("div");
        stat.className = "demo-gameover-chip";
        stat.innerHTML = `<span>${label}</span><strong>${value}</strong>`;
        panel.appendChild(stat);
      };

      const syncNightResult = (nightState, powerState) => {
        if (!body.classList.contains("night-complete-active")) return;
        const panel = ensureNightResultPanel();
        if (!panel) return;
        const power = powerState && typeof powerState.level === "number" ? `${Math.max(0, Math.round(powerState.level))}%` : "--";
        const breaches = nightState && typeof nightState.breachCount === "number" ? nightState.breachCount : 0;
        const checks = nightState && typeof nightState.attackTriggeredCount === "number" ? nightState.attackTriggeredCount : 0;
        const signature = `${power}|${breaches}|${checks}`;
        if (signature === lastResultSignature) return;
        lastResultSignature = signature;
        panel.textContent = "";
        setResultStat(panel, "Power", power);
        setResultStat(panel, "Breaches", String(breaches));
        setResultStat(panel, "Checks", String(checks));
      };

      const syncGameOverReport = (nightState, powerState) => {
        return;
      };

      const clearMapPressure = () => {
        mapButtons.forEach((button) => button.classList.remove("is-freddy-noise"));
      };

      const syncDirector = () => {
        const nightState = window.__daymoriFreddyNightState || null;
        const powerState = window.__daymoriPowerState || null;
        const running = Boolean(nightState && nightState.started && !nightState.cleared && !nightState.gameOver)
          && !body.classList.contains("main-menu-open")
          && !body.classList.contains("intro-sequence-open")
          && !body.classList.contains("freddy-jumpscare-active")
          && !body.classList.contains("freddy-game-over")
          && !body.classList.contains("night-complete-active");
        const routePressure = running && Boolean(nightState.freddyRoute);
        const doorPressure = running && Number(nightState.doorStage || 0) > 0;
        const nearBreach = doorPressure && Number(nightState.doorStage || 0) >= 2;
        const freddyRoom = nightState && nightState.freddyMonitorRoom ? nightState.freddyMonitorRoom : "";
        const tabletOpen = body.classList.contains("tablet-open");
        const observedRoom = cameraFeed && tabletOpen ? cameraFeed.dataset.room : "";
        const observedThreat = routePressure && freddyRoom && observedRoom === freddyRoom;
        if (routePressure && freddyRoom) {
          lastKnownThreatRoom = freddyRoom;
        }
        if (doorPressure) {
          lastKnownThreatRoom = "safe-room";
        }
        if (observedThreat) {
          lastObservedThreatRoom = observedRoom;
        }

        const now = Date.now();
        if (running && tabletOpen) {
          if (!tabletOpenStartedAt) tabletOpenStartedAt = now;
        } else {
          tabletOpenStartedAt = 0;
        }
        const tabletFatigue = running && tabletOpenStartedAt && (now - tabletOpenStartedAt) > 16000;

        body.classList.toggle("demo-route-pressure", routePressure);
        body.classList.toggle("demo-door-pressure", doorPressure);
        body.classList.toggle("demo-near-breach", nearBreach);
        body.classList.toggle("demo-tablet-fatigue", Boolean(tabletFatigue));
        if (cameraFeed) {
          cameraFeed.classList.toggle("demo-observed-threat", Boolean(observedThreat));
        }

        // Keep monitor markers visually consistent even when Freddy moves.
        clearMapPressure();

        syncNightResult(nightState, powerState);
        syncGameOverReport(nightState, powerState);
        window.__daymoriDemoDirectorState = {
          running,
          routePressure,
          doorPressure,
          nearBreach,
          tabletFatigue: Boolean(tabletFatigue),
          freddyRoom,
          lastKnownThreatRoom: lastKnownThreatRoom || null,
          lastObservedThreatRoom: lastObservedThreatRoom || null,
          observedRoom: observedRoom || null,
          observedThreat: Boolean(observedThreat),
        };
      };

      const startDirector = () => {
        if (directorTimer) return;
        directorTimer = window.setInterval(syncDirector, 250);
        syncDirector();
      };

      const stopDirector = () => {
        if (directorTimer) {
          window.clearInterval(directorTimer);
          directorTimer = null;
        }
        body.classList.remove("demo-route-pressure", "demo-door-pressure", "demo-near-breach", "demo-tablet-fatigue");
        if (cameraFeed) cameraFeed.classList.remove("demo-observed-threat");
        clearMapPressure();
      };

      window.__daymoriSyncDemoDirector = syncDirector;
      startDirector();

      window.addEventListener("beforeunload", () => {
        stopDirector();
        delete window.__daymoriSyncDemoDirector;
        delete window.__daymoriDemoDirectorState;
      });
    })();
  </script>
