  <style>
    :root {
      --night-deep: #03070c;
      --night-mid: #07121e;
      --storm-blue: #0f2236;
      --glass-fog: rgba(113, 149, 181, 0.1);
      --text: #d8e2ec;
      --text-muted: #9eb2c4;
    }

    @property --freddy-jit-x {
      syntax: "<length>";
      inherits: false;
      initial-value: 0px;
    }

    @property --freddy-jit-y {
      syntax: "<length>";
      inherits: false;
      initial-value: 0px;
    }

    @property --freddy-jit-r {
      syntax: "<angle>";
      inherits: false;
      initial-value: 0deg;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      overflow: hidden;
      background: radial-gradient(circle at 50% 22%, #10213a 0%, #060b13 45%, #02050a 100%);
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      transform: none;
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    .viewport {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(to bottom, #0d1927 0%, #060b13 52%, #02050a 100%);
      cursor: default;
      --flash-x: 50%;
      --flash-y: 52%;
      --scene-scale: 1;
      --scene-stretch-y: 1;
      --scene-shift-y: 0%;
    }

    .viewport::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 9;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 56%, rgba(0, 0, 0, 0.42) 0%, rgba(0, 0, 0, 0) 52%),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.18) 0%, rgba(0, 0, 0, 0.58) 100%);
      mix-blend-mode: multiply;
      opacity: 0.22;
      transition: opacity 180ms ease;
    }

    .viewport::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      background:
        radial-gradient(circle at var(--flash-x) var(--flash-y), rgba(247, 251, 255, 0.98) 0%, rgba(229, 240, 252, 0.92) 5.5%, rgba(201, 219, 238, 0.58) 13%, rgba(149, 171, 195, 0.24) 24%, rgba(94, 116, 139, 0.06) 34%, rgba(94, 116, 139, 0) 42%),
        radial-gradient(ellipse 42% 28% at var(--flash-x) calc(var(--flash-y) + 4%), rgba(222, 235, 250, 0.28) 0%, rgba(188, 207, 228, 0.14) 22%, rgba(145, 166, 188, 0.03) 48%, rgba(145, 166, 188, 0) 62%);
      mix-blend-mode: screen;
      opacity: 0;
      transition: opacity 72ms linear;
      filter: blur(0.05px) contrast(1.08) saturate(0.35);
    }

    .viewport.flashlight-active::after {
      opacity: 1;
    }

    .viewport.flashlight-recover::after {
      opacity: 0.08;
      transition-duration: 150ms;
    }

    .panorama {
      position: absolute;
      left: 0;
      top: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      will-change: transform;
      transform: translateX(0);
      filter: saturate(0.92) contrast(1.04);
      transform-origin: 50% 52%;
      animation: camera-breath-strong 2.9s ease-in-out infinite;
    }

    .left-panel,
    .right-panel {
      display: none;
    }

    .panorama::before {
      display: none;
    }

    .panel {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
    }

    .side-real-photo {
      position: absolute;
      inset: 0;
      background-image: url("assets/safety-room-comic-reference.jpg");
      background-size: cover;
      filter: brightness(0.92) contrast(1.1) grayscale(1);
      z-index: 1;
      opacity: 0.68;
    }

    .left-panel .side-real-photo {
      background-position: 50% 100%;
      transform: translateY(calc(var(--scene-shift-y) * 1.36)) scale(var(--scene-scale));
      transform-origin: 50% 50%;
    }

    .right-panel .side-real-photo {
      background-position: 50% 100%;
      transform: translateY(calc(var(--scene-shift-y) * 1.36)) scale(var(--scene-scale));
      transform-origin: 50% 50%;
    }

    .left-panel .layout-overlay,
    .right-panel .layout-overlay {
      display: none;
    }

    .layout-overlay {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }

        radial-gradient(ellipse at 24% 72%, rgba(166, 185, 199, 0.24) 0 24%, rgba(0, 0, 0, 0) 25%),
        radial-gradient(ellipse at 52% 74%, rgba(166, 185, 199, 0.22) 0 22%, rgba(0, 0, 0, 0) 23%);

    }

    .right-poster {

      top: 26%;
      width: 18%;

        linear-gradient(to bottom, rgba(228, 236, 243, 0.22), rgba(203, 215, 225, 0.15)),
        linear-gradient(to bottom, rgba(13, 24, 36, 0) 68%, rgba(13, 24, 36, 0.26) 100%);
      box-shadow: 0 6px 10px rgba(0, 0, 0, 0.26);
      opacity: 0.64;
    }

    .right-poster::before {
      content: "";
      position: absolute;
      left: 18%;
      right: 18%;
      top: 16%;

      background: rgba(53, 67, 78, 0.42);

    }

    .right-clock {
      position: absolute;
      right: 18%;

      width: 13%;

      border-radius: 50%;
      border: 2px solid rgba(202, 216, 227, 0.28);

    }

    .right-clock::before {
      content: "";
      position: absolute;
      left: 49%;
      top: 28%;
      width: 1.5%;
      height: 23%;
      background: rgba(16, 25, 34, 0.72);
      transform: rotate(28deg);
      transform-origin: bottom center;
    }

    .edge-blend {

    .left-panel .edge-blend {
      background: linear-gradient(to right, rgba(4, 9, 14, 0.4) 0%, rgba(4, 9, 14, 0.1) 24%, rgba(4, 9, 14, 0) 52%, rgba(4, 9, 14, 0) 93%, rgba(4, 9, 14, 0.03) 100%);

    }

    .panel-grime {
      position: absolute;
      inset: 0;
      z-index: 3;

        radial-gradient(circle at 72% 54%, rgba(10, 18, 29, 0.25) 0%, rgba(10, 18, 29, 0) 24%),
        linear-gradient(102deg, rgba(167, 194, 211, 0.05) 2%, rgba(167, 194, 211, 0) 22%);
      pointer-events: none;
    }

    .left-panel .panel-shadow,
    .right-panel .panel-shadow,
    .left-panel .panel-grime,
    .right-panel .panel-grime {
      opacity: 0.55;
    }

    .center-panel {
      background: #080f17;
    }

    .center-panel::before,
    .center-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 6;
      pointer-events: none;
      opacity: 0;
    }

    .center-panel::before {
      background:
        linear-gradient(to bottom, rgba(0, 0, 0, 0.54) 0%, rgba(0, 0, 0, 0.3) 38%, rgba(0, 0, 0, 0.58) 100%),

    }

    .center-panel::after {
      background:
        linear-gradient(to bottom, rgba(0, 0, 0, 0.92) 0%, rgba(0, 0, 0, 0.48) 16%, rgba(0, 0, 0, 0.02) 34%, rgba(0, 0, 0, 0.02) 66%, rgba(0, 0, 0, 0.56) 84%, rgba(0, 0, 0, 0.94) 100%),

      transform-origin: 50% 50%;
    }

    .photo-wrap {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: grid;
      place-items: center;
      background: #000 url("../../安全屋场景/53945ff0b0c330faa0eb53fa37d77d2d.png") center center / cover no-repeat;

    .photo-wrap::before {
      content: "";
      position: absolute;
      inset: 0;

      pointer-events: none;
      background:
        radial-gradient(ellipse at 28% 7%, rgba(255, 255, 255, 0.22) 0%, rgba(255, 255, 255, 0.12) 18%, rgba(255, 255, 255, 0) 42%),

    }

    .photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 50% 50%;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      filter: brightness(1.08) contrast(1.08) grayscale(1);
      transform: translateY(var(--scene-shift-y)) scaleY(calc(var(--scene-scale) * var(--scene-stretch-y)));
      transform-origin: 50% 50%;
    }

    .photo-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background:
        linear-gradient(to bottom, rgba(0, 0, 0, 0.08) 0%, rgba(0, 0, 0, 0.2) 70%, rgba(0, 0, 0, 0.36) 100%),

    }

    .vent-shadow-layer {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      background: none;
      mix-blend-mode: multiply;
      opacity: 0.92;
      filter: blur(0.18px) contrast(1.06);
      transition: opacity 120ms linear, filter 120ms linear;
    }

    .vent-shadow-layer::before,
    .vent-shadow-layer::after {

      filter: blur(0.72px) contrast(1.01);
      opacity: 0.68;
      box-shadow: none;
      -webkit-mask-image: radial-gradient(ellipse at 50% 54%, #000 0 42%, rgba(0, 0, 0, 0.7) 60%, rgba(0, 0, 0, 0.22) 78%, transparent 100%);
      mask-image: radial-gradient(ellipse at 50% 54%, #000 0 42%, rgba(0, 0, 0, 0.7) 60%, rgba(0, 0, 0, 0.22) 78%, transparent 100%);
    }

    .vent-shadow-layer::before {
      left: 19.1%;
      top: 61.4%;
      width: 8.4%;
      height: 20.2%;
      clip-path: polygon(18% 10%, 92% 2%, 80% 88%, 7% 98%, 1% 28%);
      transform: skewY(-1.4deg) rotate(-0.25deg);
    }

    .vent-shadow-layer::after {

      height: 18.8%;
      clip-path: polygon(10% 8%, 94% 2%, 98% 90%, 16% 98%, 2% 33%);
      transform: skewY(0.9deg) rotate(0.15deg);
    }

    .viewport.flashlight-active .vent-shadow-layer {
      -webkit-mask-image: radial-gradient(circle at var(--flash-x) var(--flash-y), rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0) 15%, rgba(0, 0, 0, 0.62) 27%, #000 41%);
      mask-image: radial-gradient(circle at var(--flash-x) var(--flash-y), rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0) 15%, rgba(0, 0, 0, 0.62) 27%, #000 41%);

      filter: blur(0.12px) contrast(1.02);
    }

    .bonnie-pipe-presence {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 8;
      pointer-events: none;
      object-fit: cover;
      object-position: 50% 50%;
      mix-blend-mode: normal;
      opacity: 0;
      filter: brightness(0.16) contrast(1.02) saturate(0.42) grayscale(0.24) blur(0.14px);
      transform: scale(1.02);
      transform-origin: 50% 50%;
      transition: opacity 180ms linear, transform 220ms ease, filter 180ms linear;
    }

    body.bonnie-left-pipe-active .bonnie-pipe-presence {
      opacity: 0;
      filter: brightness(0.96) contrast(1.08) saturate(0.98) grayscale(0.02);
      transform: translate3d(0, 0, 0) scale(1);
    }

    body.bonnie-left-pipe-active .center-panel .photo {
      object-fit: cover !important;
      object-position: 50% 50% !important;
      filter: brightness(0.96) contrast(1.08) saturate(0.98) grayscale(0.02) !important;
    }

    body.bonnie-left-pipe-active.bonnie-mask-on .center-panel .photo {
      filter: brightness(0.48) contrast(1.04) saturate(0.62) grayscale(0.12) blur(0.2px) !important;

    body.bonnie-left-pipe-active.bonnie-mask-on .bonnie-pipe-presence {

      filter: brightness(0.48) contrast(1.04) saturate(0.62) grayscale(0.12) blur(0.2px);
      transform: scale(1.01);
    }

    body.bonnie-left-pipe-retreating .bonnie-pipe-presence {
      opacity: 0.3;
      filter: brightness(0.22) contrast(1.02) saturate(0.42) grayscale(0.36) blur(0.52px);
      transform: scale(0.985);
    }

    body.bonnie-vision-recover .center-panel .photo {
      animation: bonnie-room-eye-recover 860ms cubic-bezier(0.18, 0.8, 0.24, 1) both;
      will-change: opacity, transform;
    }

    body.bonnie-vision-recover .center-panel::before {
      animation: bonnie-room-eye-shade-recover 860ms cubic-bezier(0.18, 0.8, 0.24, 1) both;

    body.bonnie-vision-recover .center-panel::after {

    }

    body.bonnie-vision-recover .viewport::before {
      animation: bonnie-room-eye-vignette-recover 860ms cubic-bezier(0.18, 0.8, 0.24, 1) both !important;
    }

    .tablet-screen {

    .tablet-header {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;

      justify-content: space-between;
      gap: 12px;
      padding: 0 clamp(12px, 1.8vw, 22px);

      color: rgba(235, 241, 247, 0.9);
    }

    .camera-battery-label {
      font-size: clamp(10px, 0.95vw, 13px);
      letter-spacing: 0.08em;
      opacity: 0.9;
      text-shadow: 0 0 8px rgba(0, 0, 0, 0.45);
    }

    .camera-battery-shell {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      min-width: clamp(54px, 5.4vw, 68px);
      min-height: clamp(18px, 1.9vh, 22px);
      padding: 2px 8px 2px 6px;
      border: 2px solid rgba(228, 236, 244, 0.86);
      border-radius: 3px;
      background: rgba(4, 7, 11, 0.6);
      box-shadow: 0 0 0 1px rgba(7, 12, 18, 0.85) inset;
    }

    .camera-battery-shell::after {
      content: "";
      width: 3px;
      height: 10px;
      margin-left: 2px;
      border-radius: 1px;
      background: rgba(228, 236, 244, 0.86);
      box-shadow: 0 0 6px rgba(188, 210, 227, 0.24);
    }

    .camera-battery-cell {
      width: clamp(9px, 0.9vw, 12px);
      height: clamp(12px, 1.1vh, 14px);
      border: 1px solid rgba(229, 237, 245, 0.72);
      background: rgba(226, 235, 244, 0.84);
    }

    .camera-battery-value {
      font-size: clamp(10px, 0.98vw, 13px);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.08em;
      color: rgba(236, 242, 247, 0.94);
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.52);
      line-height: 1;
    }

    .camera-battery-cell.is-empty {
      background: rgba(16, 23, 31, 0.36);
    }

    .camera-battery-cell.is-warning:not(.is-empty) {
      background: rgba(238, 232, 204, 0.9);
      box-shadow: 0 0 8px rgba(238, 232, 204, 0.18);
    }

    body.power-low .camera-battery-shell {
      border-color: rgba(226, 220, 196, 0.78);
      box-shadow: 0 0 0 1px rgba(7, 12, 18, 0.85) inset, 0 0 10px rgba(226, 220, 196, 0.1);
    }

    body.power-critical .camera-battery-shell {
      border-color: rgba(214, 202, 174, 0.64);
      box-shadow: 0 0 0 1px rgba(7, 12, 18, 0.92) inset, 0 0 16px rgba(214, 202, 174, 0.14);
      animation: power-critical-flicker 960ms steps(3, end) infinite;
    }

    body.power-depleted .camera-battery-shell {
      border-color: rgba(170, 162, 150, 0.56);
      box-shadow: 0 0 14px rgba(0, 0, 0, 0.42) inset;

    body.power-depleted .safety-room-actions {
      opacity: 0.42;
      filter: grayscale(0.72) brightness(0.74);
    }

    body.power-low .camera-feed::before {
      opacity: 0.58;
    }

    body.power-critical .camera-feed {
      filter: contrast(1.18) saturate(0.58) brightness(0.88);
    }

    body.power-critical .camera-feed::before {
      opacity: 0.72;
      animation-duration: 76ms;
    }

    body.power-critical .camera-static-layer {
      opacity: 0.48;
      animation-duration: 5.4s, 1.1s;
    }

    .camera-mute-call {
      pointer-events: auto;
      border: 2px solid rgba(190, 199, 208, 0.7);
      border-radius: 6px;
      min-height: 34px;
      padding: 0 14px;
      background: linear-gradient(to bottom, rgba(95, 103, 114, 0.74), rgba(53, 58, 66, 0.74));
      color: rgba(231, 237, 242, 0.9);
      font-family: "Consolas", "Courier New", monospace;
      font-size: clamp(11px, 0.98vw, 13px);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(0, 0, 0, 0.32) inset;
    }

    .camera-night-readout {
      position: absolute;
      right: clamp(40px, 4vw, 56px);
      top: clamp(18px, 2.4vh, 28px);
      z-index: 13;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      min-height: clamp(20px, 2.2vw, 28px);
      gap: 0;
      color: rgba(238, 244, 250, 0.96);
      line-height: 1;
      text-align: right;
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.58);
      pointer-events: none;
    }

    .camera-night-readout span {
      display: none;
    }

    .camera-night-readout strong {
      font-size: clamp(14px, 1.55vw, 22px);
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .tablet-close-btn {
      position: absolute;
      right: clamp(12px, 1.8vw, 22px);
      top: clamp(10px, 1.4vh, 16px);
      z-index: 16;
      min-height: 30px;
      padding: 0 10px;
      border: 2px solid rgba(205, 216, 226, 0.76);
      border-radius: 4px;
      background: linear-gradient(to bottom, rgba(83, 92, 102, 0.72), rgba(45, 50, 58, 0.76));
      color: rgba(232, 238, 243, 0.92);
      font-family: "Consolas", "Courier New", monospace;
      font-size: clamp(10px, 0.95vw, 12px);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.42), 0 0 0 1px rgba(8, 12, 18, 0.42) inset;
      transition: filter 120ms ease;
    }

    .tablet-close-btn:hover,
    .tablet-close-btn:focus-visible {
      filter: brightness(1.08);
      outline: none;
    }

    .tablet-status {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: rgba(192, 206, 220, 0.28);
      font-size: clamp(9px, 0.85vw, 12px);
      letter-spacing: 0.09em;
      pointer-events: none;
      user-select: none;
      opacity: 0;
    }

    .tablet-monitor {
      position: absolute;
      inset: 0;
      background: #04070c;
      overflow: hidden;
    }

    .camera-feed {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 34%, rgba(22, 32, 46, 0.62) 0%, rgba(7, 12, 20, 0.94) 54%, rgba(2, 5, 9, 1) 100%),
        linear-gradient(90deg, rgba(255, 255, 255, 0.018) 0%, rgba(255, 255, 255, 0) 12%, rgba(255, 255, 255, 0.022) 37%, rgba(255, 255, 255, 0) 62%, rgba(255, 255, 255, 0.016) 100%),
        linear-gradient(to bottom, rgba(10, 14, 18, 0.96), rgba(3, 5, 7, 0.98));
      filter: contrast(1.12) saturate(0.64) brightness(0.96);
      animation: cam-feed-wobble 2.8s ease-in-out infinite;
    }

    .camera-feed::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 34% 48%, rgba(127, 160, 189, 0.07) 0%, rgba(127, 160, 189, 0) 38%),
        radial-gradient(circle at 78% 18%, rgba(146, 179, 208, 0.05) 0%, rgba(146, 179, 208, 0) 32%),
        repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.05) 0px,
          rgba(255, 255, 255, 0.05) 1px,
          rgba(0, 0, 0, 0) 1px,
          rgba(0, 0, 0, 0) 2px,
          rgba(0, 0, 0, 0.26) 2px,
          rgba(0, 0, 0, 0.26) 4px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.018) 0px,
          rgba(255, 255, 255, 0.018) 1px,
          rgba(0, 0, 0, 0) 1px,
          rgba(0, 0, 0, 0) 3px
        );
      mix-blend-mode: screen;
      opacity: 0.68;
      animation: menu-scanline 82ms steps(3, end) infinite;
      z-index: 8;
      pointer-events: none;
    }

    .camera-feed::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 52% 54%, rgba(0, 0, 0, 0) 38%, rgba(0, 0, 0, 0.9) 100%),
        repeating-linear-gradient(90deg, rgba(236, 242, 248, 0.024) 0 1px, rgba(0, 0, 0, 0) 1px 4px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.028) 0%, rgba(255, 255, 255, 0) 24%, rgba(0, 0, 0, 0.08) 58%, rgba(0, 0, 0, 0.2) 100%);
      z-index: 9;
      opacity: 0.9;
    }

    .camera-static-layer {
      position: absolute;
      inset: -12%;
      z-index: 10;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 20% 24%, rgba(223, 235, 245, 0.08) 0 0.8px, rgba(223, 235, 245, 0) 1px),
        radial-gradient(circle at 72% 46%, rgba(206, 222, 235, 0.06) 0 0.8px, rgba(206, 222, 235, 0) 1px),
        radial-gradient(circle at 84% 70%, rgba(197, 216, 231, 0.04) 0 0.7px, rgba(197, 216, 231, 0) 0.9px);
      background-size: 130px 130px, 170px 170px, 220px 220px;
      mix-blend-mode: screen;
      opacity: 0.46;
      filter: contrast(1.12) brightness(0.92);
      animation: grain-drift 7.4s linear infinite, grain-flicker 1.1s steps(2, end) infinite;
    }

    .camera-monitor-flash {
      position: absolute;
      inset: 0;
      z-index: 14;
      pointer-events: none;
      background:
        radial-gradient(circle at var(--cam-flash-x, 50%) var(--cam-flash-y, 52%), rgba(248, 252, 255, 0.92) 0%, rgba(226, 239, 252, 0.62) 9%, rgba(190, 211, 232, 0.26) 22%, rgba(128, 152, 176, 0.06) 38%, rgba(128, 152, 176, 0) 50%);
      mix-blend-mode: screen;
      opacity: 0;
      transition: opacity 76ms linear;
      filter: saturate(0.35) contrast(1.12);
    }

    .camera-feed.monitor-flashlight-active .camera-monitor-flash {
      opacity: 1;
    }

    .camera-feed.monitor-flashlight-active .classroom-b-scene {
      filter: contrast(1.28) saturate(0.2) brightness(0.9) grayscale(0.62) hue-rotate(188deg);
    }

    .camera-feed.monitor-flashlight-active .classroom-b-animatronic {
      filter:
        grayscale(0.28)
        saturate(0.18)
        contrast(1.28)
        brightness(0.68)
        sepia(0)
        drop-shadow(0 10px 22px rgba(0, 0, 0, 0.62));
    }

    .camera-cut-interference {
      position: absolute;
      inset: 0;
      z-index: 15;
      pointer-events: none;
      opacity: 0;
      background:
        linear-gradient(to bottom, rgba(255, 255, 255, 0.16) 0%, rgba(255, 255, 255, 0) 26%, rgba(0, 0, 0, 0.24) 100%),
        repeating-linear-gradient(
          to bottom,
          rgba(238, 246, 252, 0.26) 0px,
          rgba(238, 246, 252, 0.26) 1px,
          rgba(5, 11, 19, 0.2) 1px,
          rgba(5, 11, 19, 0.2) 4px
        );
      mix-blend-mode: screen;
    }

    .camera-feed.is-signal-cut {
      animation: cam-cut-jitter 120ms steps(2, end) 1;
      filter: contrast(1.18) saturate(0.56) brightness(0.88);
    }

    .camera-feed.is-signal-cut .camera-cut-interference {
      opacity: 1;
      animation: cam-cut-flash 210ms steps(3, end) 1;
    }

    .camera-feed.is-signal-cut .classroom-b-scene {
      transform: scale(1.042) translateX(3px);
      filter: contrast(1.14) saturate(0.5) brightness(0.42) hue-rotate(198deg);
    }

    .camera-feed.is-camera-locking {
      animation: terminal-lock-jitter 220ms steps(3, end) 1;
    }

    .camera-feed.is-camera-locking::before {
      opacity: 0.92;
      animation: terminal-lock-roll 220ms steps(4, end) 1;
    }

    .camera-feed.is-camera-locking::after {
      opacity: 1;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0) 0 12%, rgba(255, 255, 255, 0.18) 13% 16%, rgba(255, 255, 255, 0) 17% 100%),
        radial-gradient(circle at 52% 54%, rgba(0, 0, 0, 0) 38%, rgba(0, 0, 0, 0.9) 100%),
        repeating-linear-gradient(90deg, rgba(236, 242, 248, 0.028) 0 1px, rgba(0, 0, 0, 0) 1px 4px);
      animation: terminal-lock-band 220ms linear 1;
    }

    .camera-feed.is-camera-locking .camera-static-layer {
      opacity: 0.72;
      animation-duration: 3.8s, 0.18s;
    }

    .camera-feed.is-camera-locking .camera-room-label,
    .camera-feed.is-camera-locking .camera-room-stamp {
      animation: terminal-label-flicker 220ms steps(3, end) 1;
    }

    .tablet-status.is-camera-locking {
      opacity: 1 !important;
      animation: terminal-label-flicker 220ms steps(3, end) 1;
    }

    @keyframes terminal-lock-jitter {
      0% { transform: translate3d(0, 0, 0) scale(1); }
      18% { transform: translate3d(-2px, 0, 0) scale(1.008); }
      36% { transform: translate3d(2px, 0, 0) scale(0.996); }
      54% { transform: translate3d(-1px, 1px, 0) scale(1.004); }
      100% { transform: translate3d(0, 0, 0) scale(1); }
    }

    @keyframes terminal-lock-roll {
      0% { transform: translateY(-14%); }
      100% { transform: translateY(12%); }
    }

    @keyframes terminal-lock-band {
      0% { background-position: 0 -20%, 0 0, 0 0; }
      100% { background-position: 0 120%, 0 0, 0 0; }
    }

    @keyframes terminal-label-flicker {
      0%, 100% { opacity: 1; }
      25% { opacity: 0.22; }
      50% { opacity: 0.84; }
      75% { opacity: 0.16; }
    }

    .camera-feed.freddy-departure-flash {
      animation: cam-cut-jitter 170ms steps(2, end) 1;
      filter: contrast(1.18) saturate(0.62) brightness(0.92);
    }

    .camera-feed.freddy-departure-flash .camera-cut-interference {
      opacity: 1;

      48% {

        room12: ["freddy-fake-signal-room12.png"],

      const adjacentWarmGroups = {

          }
        };
        appendGroup(roomKey);
        if (includeAdjacent) {
          const neighbors = adjacentWarmGroups[roomKey] || [];

        if (mode === "tablet") {

  <script>
    (function initDoorStageEvent() {
      const body = document.body;

      let freddyJumpscareLayer = document.getElementById("freddyJumpscareLayer");

      }
      if (!freddyJumpscareLayer.querySelector(".freddy-retry-panel")) {
        const retryPanel = document.createElement("div");

        freddyJumpscareLayer.appendChild(retryPanel);

      let bonnieJumpscareLayer = document.getElementById("bonnieJumpscareLayer");

        bonnieJumpscareLayer = document.createElement("div");
        bonnieJumpscareLayer.id = "bonnieJumpscareLayer";
        bonnieJumpscareLayer.className = "bonnie-jumpscare-layer";
        bonnieJumpscareLayer.setAttribute("aria-hidden", "true");
        bonnieJumpscareLayer.innerHTML = '<img class="bonnie-jumpscare-figure" data-src="../../安全屋场景/967889b33b4f18739fb729c1129b2073.png" data-mobile-src="../../安全屋场景/967889b33b4f18739fb729c1129b2073.png" data-fallback-src="bonnie.png" alt="" decoding="async" /><span class="bonnie-jumpscare-mouth" aria-hidden="true"></span>';
        body.appendChild(bonnieJumpscareLayer);
      }

      let nightCompleteLayer = document.getElementById("nightCompleteLayer");
      if (!nightCompleteLayer) {
        nightCompleteLayer = document.createElement("div");
        nightCompleteLayer.id = "nightCompleteLayer";
        nightCompleteLayer.className = "night-complete-layer";
        nightCompleteLayer.setAttribute("aria-hidden", "true");
        nightCompleteLayer.innerHTML = '<span class="night-complete-time">6 A.M.</span><span class="night-complete-half night-complete-half-top">6 A.M.</span><span class="night-complete-half night-complete-half-bottom">6 A.M.</span><span class="night-complete-clear">Night 1 Cleared</span>';
        body.appendChild(nightCompleteLayer);
      }

      const freddyJumpscareFigure = freddyJumpscareLayer.querySelector(".freddy-jumpscare-figure");
      const bonnieJumpscareFigure = bonnieJumpscareLayer.querySelector(".bonnie-jumpscare-figure");
      const BONNIE_FINAL_STAGE_IMAGE = "fd4c15eac2477eccdcc3078907123ae9.png";
      const BONNIE_FINAL_STAGE_MOBILE_IMAGE = "fd4c15eac2477eccdcc3078907123ae9.png";
      const BONNIE_JUMPSCARE_IMAGE = "../../安全屋场景/967889b33b4f18739fb729c1129b2073.png";
      const CHICA_FINAL_STAGE_IMAGE = "../../安全屋场景/95374c8412cee8ba0292bb1c01f78b60.png";
      const CHICA_FINAL_STAGE_MOBILE_IMAGE = "../../安全屋场景/95374c8412cee8ba0292bb1c01f78b60.png";
      const CHICA_JUMPSCARE_IMAGE = "../../安全屋场景/a0e911581177d658fa06b112b6bcc607.png";
      const HOLDER_ROOM5_STAGE1_IMAGE = "../../安全屋场景/353dcac02ae691a97ab411efc9edd27b.png";
      const HOLDER_ROOM5_STAGE2_IMAGE = "../../安全屋场景/53f26681153c3056537be7a2cb6575a8.png";
      const HOLDER_ROOM5_STAGE3_IMAGE = "../../安全屋场景/7a8ca066f1372c5db02d19d7484ddbbd.png";
      const HOLDER_CAM3_IDLE_IMAGE = "../../安全屋场景/17954da7320043363cd2bad8ffd874b5.png";
      const HOLDER_CAM3_READY_IMAGE = "../../安全屋场景/e5d6bef858395c91a0ba5dcec702a6c8.png";
      const HOLDER_JUMPSCARE_IMAGE = "../../安全屋场景/ed52093463bb1aacd6a00b7dd662d05e.png";
      const ROOM3_CHICA_GONE_IMAGE = "../../安全屋场景/cc44822ef2380d98023e5b89fa45a211.png";
      const ROOM3_BONNIE_CHICA_GONE_IMAGE = "../../安全屋场景/fdd12f4b932463e859449d64f11271fa.png";
      const ROOM3_ALL_GONE_IMAGE = "../../安全屋场景/5e7efdef1ba49741a9f57beb33901a45.png";
      const CHICA_FINAL_STAGE_FAIL_MS = 5000;
      const CHICA_FINAL_STAGE_MASK_HOLD_MS = 6000;
      const HOLDER_ROOM5_STAGE1_MS = 14000;
      const HOLDER_ROOM5_STAGE2_MS = 12000;
      const HOLDER_ROOM5_STAGE3_MS = 11000;
      const HOLDER_CAM3_FAIL_MS = 8000;
      const HOLDER_CAM3_REQUIRED_FLASHES = 5;
      const isMobileAssetMode = () => {
        if (window.matchMedia) {
          return window.matchMedia("(pointer: coarse), (max-width: 1180px)").matches;
        }
        return window.innerWidth <= 1180;
      };
      const resolveDeferredImageSrc = (img) => {
        if (!img) return "";
        if (isMobileAssetMode()) {
          return img.dataset.mobileSrc || img.dataset.src || img.getAttribute("src") || "";
        }
        return img.dataset.src || img.getAttribute("src") || "";
      };
      const hydrateDeferredImage = (img) => {
        if (!img || img.getAttribute("src")) return;
        const source = resolveDeferredImageSrc(img);
        if (source) img.setAttribute("src", source);
      };
      const setBonnieJumpscareFigureSource = (src, fallbackSrc = src) => {
        if (!bonnieJumpscareFigure) return;
        bonnieJumpscareFigure.dataset.fallbackApplied = "0";
        bonnieJumpscareFigure.setAttribute("data-src", src);
        bonnieJumpscareFigure.setAttribute("data-mobile-src", src);
        bonnieJumpscareFigure.setAttribute("data-fallback-src", fallbackSrc);
        bonnieJumpscareFigure.removeAttribute("src");
      };
      const hydrateDoorStageImages = (stage) => {
        const selector = stage === 1 ? ".door-stage1-open img" : ".door-stage2-open img";
        Array.from(doorPresence.querySelectorAll(selector)).forEach(hydrateDeferredImage);
      };
      const pickSrcsetFirstEntry = (srcsetValue) => {
        if (!srcsetValue) return "";
        const first = srcsetValue.split(",")[0] || "";
        const token = first.trim().split(/\s+/)[0] || "";
        return token;
      };
      const resolveMaskSceneImage = () => {
        if (safetyRoomSceneSource && window.matchMedia) {
          const mediaRule = safetyRoomSceneSource.getAttribute("media") || "";
          const sourceSet = safetyRoomSceneSource.getAttribute("srcset") || "";
          if (mediaRule && sourceSet && window.matchMedia(mediaRule).matches) {
            const matchedSource = pickSrcsetFirstEntry(sourceSet);
            if (matchedSource) return matchedSource;
          }
        }
        if (!safetyRoomSceneImage) return "";
        return safetyRoomSceneImage.currentSrc || safetyRoomSceneImage.getAttribute("src") || "";
      };
      const syncBonnieMaskSceneImage = () => {
        if (!bonnieMaskOverlay) return;
        const sceneImage = resolveMaskSceneImage();
        if (sceneImage) {
          bonnieMaskOverlay.style.setProperty("--mask-eye-room-image", `url("${sceneImage}")`);
        }
      };
      const syncBonnieFinalStageScene = () => {
        if (!safetyRoomSceneImage) return;

        const originalDesktop = safetyRoomSceneImage.dataset.defaultSrc || safetyRoomSceneImage.getAttribute("src") || "";
        if (!safetyRoomSceneImage.dataset.defaultSrc && originalDesktop) {
          safetyRoomSceneImage.dataset.defaultSrc = originalDesktop;
        }

        if (safetyRoomSceneSource) {
          const originalMobile = safetyRoomSceneSource.dataset.defaultSrcset || safetyRoomSceneSource.getAttribute("srcset") || "";
          if (!safetyRoomSceneSource.dataset.defaultSrcset && originalMobile) {
            safetyRoomSceneSource.dataset.defaultSrcset = originalMobile;
          }
        }

        if (chicaFinalStageActive) {
          body.classList.add("chica-final-stage-active");
          safetyRoomSceneImage.src = isMobileAssetMode() ? CHICA_FINAL_STAGE_MOBILE_IMAGE : CHICA_FINAL_STAGE_IMAGE;
          if (safetyRoomSceneSource) {
            safetyRoomSceneSource.setAttribute("srcset", CHICA_FINAL_STAGE_MOBILE_IMAGE);
          }
          syncBonnieMaskSceneImage();
          return;
        }

        body.classList.remove("chica-final-stage-active");

        if (bonnieAtLeftPipe) {
          body.classList.add("bonnie-final-stage-active");
          safetyRoomSceneImage.src = isMobileAssetMode() ? BONNIE_FINAL_STAGE_MOBILE_IMAGE : BONNIE_FINAL_STAGE_IMAGE;
          if (safetyRoomSceneSource) {
            safetyRoomSceneSource.setAttribute("srcset", BONNIE_FINAL_STAGE_MOBILE_IMAGE);
          }
          syncBonnieMaskSceneImage();
          return;
        }

        body.classList.remove("bonnie-final-stage-active");
        if (safetyRoomSceneImage.dataset.defaultSrc) {
          safetyRoomSceneImage.src = safetyRoomSceneImage.dataset.defaultSrc;
        }
        if (safetyRoomSceneSource && safetyRoomSceneSource.dataset.defaultSrcset) {
          safetyRoomSceneSource.setAttribute("srcset", safetyRoomSceneSource.dataset.defaultSrcset);
        }
        syncBonnieMaskSceneImage();
      };
      if (freddyJumpscareFigure) {
        freddyJumpscareFigure.addEventListener("error", () => {
          const fallback = freddyJumpscareFigure.getAttribute("data-fallback-src") || "";
          if (!fallback || freddyJumpscareFigure.dataset.fallbackApplied === "1") return;
          freddyJumpscareFigure.dataset.fallbackApplied = "1";
          freddyJumpscareFigure.src = fallback;
        });
      }
      if (bonnieJumpscareFigure) {
        bonnieJumpscareFigure.addEventListener("error", () => {
          const fallback = bonnieJumpscareFigure.getAttribute("data-fallback-src") || "";
          if (!fallback || bonnieJumpscareFigure.dataset.fallbackApplied === "1") return;
          bonnieJumpscareFigure.dataset.fallbackApplied = "1";
          bonnieJumpscareFigure.src = fallback;
        });
      }

      const warmRuntimeImages = () => {
        hydrateDoorStageImages(1);
        hydrateDoorStageImages(2);
        hydrateDeferredImage(freddyJumpscareFigure);
        hydrateDeferredImage(bonnieJumpscareFigure);
        if (typeof window.__daymoriWarmSafetyRoomAssets === "function") {
          window.__daymoriWarmSafetyRoomAssets();
        }
      };
      const scheduleRuntimeImageWarmup = () => {
        const schedule = (callback) => {
          if ("requestIdleCallback" in window) {
            window.requestIdleCallback(callback, { timeout: 1600 });
            return;
          }
          window.setTimeout(callback, 220);
        };
        if (document.readyState === "complete") {
          schedule(warmRuntimeImages);
        } else {
          window.addEventListener("load", () => schedule(warmRuntimeImages), { once: true });
        }
        window.addEventListener("pointerdown", warmRuntimeImages, { once: true, passive: true });
      };
      syncBonnieMaskSceneImage();
      window.addEventListener("resize", syncBonnieMaskSceneImage, { passive: true });
      window.addEventListener("orientationchange", syncBonnieMaskSceneImage, { passive: true });
      scheduleRuntimeImageWarmup();

      body.classList.remove("freddy-disabled");

      const NIGHT_DURATION_MS = 10 * 60 * 1000;
      const NIGHT_TOTAL_HOURS = 6;
      const NIGHT_TOTAL_MINUTES = NIGHT_TOTAL_HOURS * 60;
      const NIGHT_ATTACK_COUNT_MIN = 1;
      const NIGHT_ATTACK_COUNT_MAX = 1;
      const NIGHT_UI_MAX = 20;
      const NIGHT1_FREDDY_UI = 4;
      const NIGHT1_BONNIE_UI = 5;
      const NIGHT1_CHICA_UI = 4;
      const NIGHT1_HOLDER_UI = 3;
      const NIGHT1_UNLOCK_MS = Math.round(NIGHT_DURATION_MS / NIGHT_TOTAL_HOURS);
      const NIGHT1_FREDDY_FIRST_ATTACK_MIN_MS = NIGHT1_UNLOCK_MS + 12000;
      const NIGHT1_FREDDY_FIRST_ATTACK_MAX_MS = NIGHT1_UNLOCK_MS + 76000;
      const NIGHT1_BONNIE_FIRST_ATTACK_MIN_MS = NIGHT1_UNLOCK_MS + 22000;
      const NIGHT1_BONNIE_FIRST_ATTACK_MAX_MS = NIGHT1_UNLOCK_MS + 92000;
      const NIGHT1_CHICA_FIRST_ATTACK_MIN_MS = NIGHT1_UNLOCK_MS + 52000;
      const NIGHT1_CHICA_FIRST_ATTACK_MAX_MS = NIGHT1_UNLOCK_MS + 124000;
      const NIGHT1_HOLDER_UNLOCK_MIN_MS = NIGHT1_UNLOCK_MS + 8000;
      const NIGHT1_HOLDER_UNLOCK_MAX_MS = NIGHT1_UNLOCK_MS + 26000;
      const getNightUiSpeedMultiplier = (uiLevel) => Math.min(1.98, Math.max(0.82, 2.08 - ((Math.min(NIGHT_UI_MAX, Math.max(1, uiLevel)) / NIGHT_UI_MAX) * 1.02)));
      const FREDDY_UI_SPEED_MULTIPLIER = getNightUiSpeedMultiplier(NIGHT1_FREDDY_UI);
      const BONNIE_UI_SPEED_MULTIPLIER = getNightUiSpeedMultiplier(NIGHT1_BONNIE_UI);
      const HOLDER_UI_SPEED_MULTIPLIER = getNightUiSpeedMultiplier(NIGHT1_HOLDER_UI);
      const FREDDY_ATTACKS_ENABLED = true;
      const STAGE1_DURATION_MIN = 6800;
      const STAGE1_DURATION_MAX = 8800;
      const STAGE2_BREACH_MS = 10000;
      const FREDDY_FAKE_RETREAT_CHANCE = 0.5;
      const FREDDY_FAKE_RETREAT_RETURN_MS = 5000;
      const FREDDY_BLACKOUT_IN_MS = 92;
      const FREDDY_BLACKOUT_HOLD_MS = 1500;
      const FREDDY_BLACKOUT_OUT_MS = 130;
      const FLASHLIGHT_HITS_MIN = 5;
      const FLASHLIGHT_HITS_MAX = 8;
      const FLASHLIGHT_PULSE_MS = 165;
      const FLASHLIGHT_RECOVER_MS = 210;
      const FLASHLIGHT_HIT_CLASS_MS = 170;
      const FLASHLIGHT_INPUT_COOLDOWN_MS = 42;
      const FLASHLIGHT_VISUAL_PROFILE = "fnaf4-cold-white-v1";
      const VENT_SHADOW_PROFILE = "flashlight-revealed-vent-soft-inner-v8";
      const FREDDY_CAMERA_WATCH_SLOWDOWN = 0.38;

        const duration = randomFloat(0.038, 0.085);
        const master = ctx.createGain();
        const buzz = ctx.createOscillator();
        const buzzGain = ctx.createGain();
        const noise = ctx.createBufferSource();
        const noiseFilter = ctx.createBiquadFilter();
        const noiseGain = ctx.createGain();
        const bufferLength = Math.max(1, Math.floor(ctx.sampleRate * duration));
        const buffer = ctx.createBuffer(1, bufferLength, ctx.sampleRate);
        const data = buffer.getChannelData(0);

        for (let i = 0; i < bufferLength; i += 1) {
          const t = i / bufferLength;
          data[i] = (Math.random() * 2 - 1) * (1 - t);
        }

        master.gain.setValueAtTime(0.0001, now);
        master.gain.exponentialRampToValueAtTime(randomFloat(0.045, 0.095), now + 0.008);
        master.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        master.connect(ctx.destination);

        buzz.type = "sawtooth";
        buzz.frequency.setValueAtTime(randomFloat(46, 62), now);
        buzz.frequency.linearRampToValueAtTime(randomFloat(28, 38), now + duration);
        buzzGain.gain.setValueAtTime(0.08, now);
        buzzGain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

        noise.buffer = buffer;

        noiseFilter.frequency.setValueAtTime(randomFloat(2200, 4200), now);

        noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

        const bufferDuration = duration + 0.08;

        const data = buffer.getChannelData(0);
        for (let index = 0; index < frameCount; index += 1) {
          const t = index / ctx.sampleRate;
          const progress = Math.min(1, t / duration);
          const envelope = Math.pow(Math.max(0, 1 - progress), 0.62);
          const breath = Math.sin(t * 2 * Math.PI * (profile.breathHz ?? 24)) * 0.18;

          data[index] = (((Math.random() * 2) - 1) * 0.72 + breath + vocalFry) * envelope;
        }

        const noise = ctx.createBufferSource();

        noiseBand.frequency.setValueAtTime(profile.noiseBandStart ?? 1580, now);
        noiseBand.frequency.exponentialRampToValueAtTime(profile.noiseBandPeak ?? 4680, now + duration * 0.18);

        noiseBand.Q.value = profile.noiseQ ?? 1.24;
        const noiseGain = ctx.createGain();
        noiseGain.gain.setValueAtTime(0.0001, now);
        noiseGain.gain.exponentialRampToValueAtTime(profile.noiseGain ?? 0.34, now + 0.024);
        noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + duration * 0.96);
        noise.connect(noiseBand).connect(noiseGain).connect(master);
        noise.start(now);
        noise.stop(now + bufferDuration);

        const painGain = ctx.createGain();
        painGain.gain.setValueAtTime(0.0001, now);
        painGain.gain.exponentialRampToValueAtTime(profile.painGain ?? 0.34, now + 0.02);
        painGain.gain.setValueAtTime(profile.painHold ?? 0.28, now + duration * 0.32);
        painGain.gain.exponentialRampToValueAtTime(0.0001, now + duration * 0.95);

        const voiceGain = ctx.createGain();
        voiceGain.gain.setValueAtTime(0.0001, now);
        voiceGain.gain.exponentialRampToValueAtTime(profile.voiceGain ?? 0.2, now + 0.03);

          gain.gain.setValueAtTime(tone.gain * 0.78, now + duration * 0.28);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + duration * 0.95);
          vibrato.type = "sine";
          vibrato.frequency.setValueAtTime(tone.vibratoHz || 7.2, now);
          vibratoGain.gain.setValueAtTime(tone.vibratoDepth || 20, now);
          vibrato.connect(vibratoGain).connect(osc.frequency);
          osc.connect(gain).connect(painFilter);
          osc.connect(gain).connect(voiceFilter);
          osc.connect(gain).connect(rumbleGain);
          vibrato.start(now);
          osc.start(now);
          vibrato.stop(now + duration);
          osc.stop(now + duration);
        });

      const playFreddyMovementCue = (roomKey, options = {}) => {
        if (GAMEPLAY_INTERACTION_AUDIO_ONLY) return;
        if (!roomKey) return;
        const ctx = getJumpscareAudioContext();
        if (!ctx) return;

        const now = ctx.currentTime;
        const fallbackDistance = {
          "classroom-b": 0.18,
          room4: 0.46,
          room6: 0.42,
          room7: 0.7,
          room8: 0.84,
        }[roomKey] || 0.5;
        const threat = clamp(typeof options.threatLevel === "number" ? options.threatLevel : fallbackDistance, 0.12, 1);
        const master = ctx.createGain();
        master.gain.setValueAtTime(0.0001, now);
        master.gain.linearRampToValueAtTime(0.1 + threat * 0.2, now + 0.04);
        master.gain.exponentialRampToValueAtTime(0.0001, now + 1.3 + threat * 0.48);
        master.connect(ctx.destination);

        const roomPitch = {
          "classroom-b": 86,
          room4: 98,
          room6: 74,
          room7: 112,
          room8: 91,
        }[roomKey] || 88;

        [0, 0.38].forEach((offset, index) => {
          const foot = ctx.createOscillator();
          const gain = ctx.createGain();
          const filter = ctx.createBiquadFilter();
          foot.type = "triangle";
          foot.frequency.setValueAtTime(roomPitch * (index ? 0.82 : 1), now + offset);
          foot.frequency.exponentialRampToValueAtTime(42, now + offset + 0.22);
          filter.type = "lowpass";
          filter.frequency.setValueAtTime(150 + threat * 150, now + offset);
          gain.gain.setValueAtTime(0.0001, now + offset);
          gain.gain.linearRampToValueAtTime((index ? 0.08 : 0.12) + threat * 0.08, now + offset + 0.025);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.3);
          foot.connect(filter).connect(gain).connect(master);
          foot.start(now + offset);
          foot.stop(now + offset + 0.34);
        });

        const scrapeBoost = options.loudScrape ? 2.4 : 1;
        const scrapeDuration = options.loudScrape ? 0.86 : 0.62;
        const scrape = ctx.createBufferSource();
        const scrapeFilter = ctx.createBiquadFilter();
        const scrapeGain = ctx.createGain();
        const frameCount = Math.floor(ctx.sampleRate * scrapeDuration);
        const buffer = ctx.createBuffer(1, frameCount, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < frameCount; i += 1) {
          const t = i / ctx.sampleRate;
          data[i] = (Math.random() * 2 - 1) * Math.max(0, 1 - t / scrapeDuration);
        }
        scrape.buffer = buffer;
        scrapeFilter.type = "bandpass";
        scrapeFilter.frequency.setValueAtTime((options.loudScrape ? 760 : 360) + threat * 360, now + 0.16);
        scrapeFilter.frequency.linearRampToValueAtTime((options.loudScrape ? 480 : 220) + threat * 170, now + 0.74);
        scrapeFilter.Q.value = (options.loudScrape ? 2.6 : 1.4) + threat * 0.8;
        scrapeGain.gain.setValueAtTime(0.0001, now + 0.14);
        scrapeGain.gain.linearRampToValueAtTime((0.04 + threat * 0.08) * scrapeBoost, now + 0.24);
        scrapeGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.92 + (options.loudScrape ? 0.24 : 0));
        scrape.connect(scrapeFilter).connect(scrapeGain).connect(master);
        scrape.start(now + 0.14);
        scrape.stop(now + 0.96 + (options.loudScrape ? 0.26 : 0));

        if (Math.random() < (0.16 + threat * 0.44) || roomKey === "room8") {
          [0, 0.19, 0.37].forEach((offset, index) => {
            const laugh = ctx.createOscillator();
            const laughGain = ctx.createGain();
            const laughFilter = ctx.createBiquadFilter();
            laugh.type = "sawtooth";
            laugh.frequency.setValueAtTime([214, 184, 162][index], now + 0.68 + offset);
            laugh.frequency.linearRampToValueAtTime([182, 158, 138][index], now + 0.78 + offset);
            laughFilter.type = "bandpass";
            laughFilter.frequency.setValueAtTime(620 + threat * 360, now + 0.68 + offset);
            laughFilter.Q.value = 2.6 + threat * 1.4;
            laughGain.gain.setValueAtTime(0.0001, now + 0.66 + offset);
            laughGain.gain.linearRampToValueAtTime(0.026 + threat * 0.056, now + 0.7 + offset);
            laughGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.9 + offset);
            laugh.connect(laughFilter).connect(laughGain).connect(master);
            laugh.start(now + 0.66 + offset);
            laugh.stop(now + 0.94 + offset);
          });
        }
      };

      const playFreddyDangerCue = (intensity = 0.86) => {

      const playBonniePipeApproachSound = () => {
        if (!allowPassiveGameplayAudio()) return;
        const ctx = getJumpscareAudioContext();
        if (!ctx) return;

        const now = ctx.currentTime;
        const master = ctx.createGain();
        master.gain.setValueAtTime(0.0001, now);
        master.gain.linearRampToValueAtTime(0.12, now + 0.5);
        master.gain.linearRampToValueAtTime(0.26, now + 1.9);
        master.gain.exponentialRampToValueAtTime(0.0001, now + 2.6);
        master.connect(ctx.destination);

        // 管道短混响:延迟反馈营造"在金属管里"的空间感
        const duct = ctx.createDelay(0.3);
        duct.delayTime.value = 0.085;
        const ductFeedback = ctx.createGain();
        ductFeedback.gain.value = 0.38;
        const ductTone = ctx.createBiquadFilter();
        ductTone.type = "bandpass";
        ductTone.frequency.value = 760;
        ductTone.Q.value = 1.1;
        const ductWet = ctx.createGain();
        ductWet.gain.value = 0.5;
        master.connect(duct);
        duct.connect(ductTone).connect(ductFeedback).connect(duct);
        duct.connect(ductWet).connect(ctx.destination);

        // 不规则的金属闷响:肢体撞击管壁 + 金属余震 ping
        [0.12, 0.58, 0.86, 1.34, 1.52, 1.98, 2.24].forEach((offset, index) => {
          const strike = ctx.createOscillator();
          const strikeGain = ctx.createGain();
          const strikeBody = ctx.createBiquadFilter();
          strike.type = "triangle";
          strike.frequency.setValueAtTime(150 + (index % 3) * 36, now + offset);
          strike.frequency.exponentialRampToValueAtTime(54, now + offset + 0.16);
          strikeBody.type = "lowpass";
          strikeBody.frequency.value = 420;
          strikeGain.gain.setValueAtTime(0.0001, now + offset);
          strikeGain.gain.linearRampToValueAtTime(0.12 + (index % 2) * 0.05, now + offset + 0.012);
          strikeGain.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.24);
          strike.connect(strikeBody).connect(strikeGain).connect(master);
          strike.start(now + offset);
          strike.stop(now + offset + 0.28);

          const ping = ctx.createOscillator();
          const pingGain = ctx.createGain();
          ping.type = "sine";
          ping.frequency.setValueAtTime(640 + (index % 4) * 110, now + offset + 0.012);
          pingGain.gain.setValueAtTime(0.0001, now + offset + 0.012);
          pingGain.gain.linearRampToValueAtTime(0.028, now + offset + 0.022);
          pingGain.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.4);
          ping.connect(pingGain).connect(master);
          ping.start(now + offset + 0.012);
          ping.stop(now + offset + 0.44);
        });

        // 拖拽刮蹭:长度与间隔不规则,更像在狭窄管道里爬行
        [{ at: 0.3, len: 0.34 }, { at: 1.02, len: 0.42 }, { at: 1.66, len: 0.3 }, { at: 2.1, len: 0.38 }].forEach(({ at, len }, index) => {
          const frames = Math.max(1, Math.floor(ctx.sampleRate * len));
          const buffer = ctx.createBuffer(1, frames, ctx.sampleRate);
          const channel = buffer.getChannelData(0);
          for (let i = 0; i < frames; i += 1) {
            const t = i / frames;
            channel[i] = (Math.random() * 2 - 1) * Math.sin(Math.PI * t) * 0.9;
          }
          const drag = ctx.createBufferSource();
          const filter = ctx.createBiquadFilter();
          const gain = ctx.createGain();
          drag.buffer = buffer;
          filter.type = "bandpass";
          filter.frequency.setValueAtTime(900 + index * 180, now + at);
          filter.frequency.linearRampToValueAtTime(620 + index * 120, now + at + len);
          filter.Q.value = 3.2;
          gain.gain.setValueAtTime(0.0001, now + at);
          gain.gain.linearRampToValueAtTime(0.05, now + at + len * 0.3);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + at + len);
          drag.connect(filter).connect(gain).connect(master);
          drag.start(now + at);
          drag.stop(now + at + len + 0.02);
        });
      };

      const playBonniePipeRetreatSound = () => {
        if (!allowPassiveGameplayAudio()) return;
        const ctx = getJumpscareAudioContext();
        if (!ctx) return;

        const now = ctx.currentTime;
        const master = ctx.createGain();
        master.gain.setValueAtTime(0.0001, now);
        master.gain.linearRampToValueAtTime(0.18, now + 0.04);
        master.gain.exponentialRampToValueAtTime(0.0001, now + 1.1);
        master.connect(ctx.destination);

        const rumble = ctx.createOscillator();
        const rumbleGain = ctx.createGain();
        rumble.type = "sawtooth";
        rumble.frequency.setValueAtTime(126, now);
        rumble.frequency.exponentialRampToValueAtTime(54, now + 0.86);
        rumbleGain.gain.setValueAtTime(0.0001, now);
        rumbleGain.gain.linearRampToValueAtTime(0.09, now + 0.08);
        rumbleGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.96);
        rumble.connect(rumbleGain).connect(master);
        rumble.start(now);
        rumble.stop(now + 1);

        [0, 0.16, 0.34].forEach((offset) => {
          const len = Math.max(1, Math.floor(ctx.sampleRate * 0.22));
          const buffer = ctx.createBuffer(1, len, ctx.sampleRate);
          const channel = buffer.getChannelData(0);
          for (let index = 0; index < len; index += 1) {
            const t = index / len;
            channel[index] = (Math.random() * 2 - 1) * Math.pow(1 - t, 1.2);
          }
          const scrape = ctx.createBufferSource();
          const filter = ctx.createBiquadFilter();
          const gain = ctx.createGain();
          scrape.buffer = buffer;
          filter.type = "bandpass";
          filter.frequency.setValueAtTime(780, now + offset);
          filter.frequency.linearRampToValueAtTime(1580, now + offset + 0.14);
          filter.Q.value = 1.8;
          gain.gain.setValueAtTime(0.0001, now + offset);
          gain.gain.linearRampToValueAtTime(0.12, now + offset + 0.03);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.22);
          scrape.connect(filter).connect(gain).connect(master);
          scrape.start(now + offset);
          scrape.stop(now + offset + 0.24);
        });

      const getBonnieMovementThreat = (roomKey) => {
        return {
          "classroom-b": 0.22,
          room4: 0.38,
          room8: 0.5,
          room9: 0.66,
          room14: 0.8,
          room16: 0.92,
          room1: 0.96,
          cam1: 1,

      const playBonnieMovementCue = (roomKey, options = {}) => {
        if (GAMEPLAY_INTERACTION_AUDIO_ONLY) return;
        if (!roomKey) return;
        const ctx = getJumpscareAudioContext();
        if (!ctx) return;

        const now = ctx.currentTime;
        const threat = clamp(typeof options.threatLevel === "number" ? options.threatLevel : getBonnieMovementThreat(roomKey), 0.2, 1);
        const isPipeTravel = roomKey === "cam1" || roomKey === "room16";
        const master = ctx.createGain();
        master.gain.setValueAtTime(0.0001, now);
        master.gain.linearRampToValueAtTime((isPipeTravel ? 0.08 : 0.06) + threat * 0.16, now + 0.03);
        master.gain.exponentialRampToValueAtTime(0.0001, now + (isPipeTravel ? 0.92 : 0.78));
        master.connect(ctx.destination);

        if (isPipeTravel) {
          const pipeNoise = ctx.createBufferSource();
          const pipeFilter = ctx.createBiquadFilter();
          const pipeGain = ctx.createGain();
          const len = Math.max(1, Math.floor(ctx.sampleRate * 0.7));
          const buffer = ctx.createBuffer(1, len, ctx.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < len; i += 1) {
            const t = i / len;
            const flutter = Math.sin(i * 0.017) * 0.22 + Math.sin(i * 0.049) * 0.12;
            data[i] = (Math.random() * 2 - 1) * (0.95 - t * 0.5) * (0.7 + flutter);
          }
          pipeNoise.buffer = buffer;
          pipeFilter.type = "bandpass";
          pipeFilter.frequency.setValueAtTime(440 + threat * 120, now);
          pipeFilter.frequency.linearRampToValueAtTime(860 + threat * 160, now + 0.42);
          pipeFilter.Q.value = 1.4;
          pipeGain.gain.setValueAtTime(0.0001, now);
          pipeGain.gain.linearRampToValueAtTime(0.08 + threat * 0.14, now + 0.08);
          pipeGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.74);
          pipeNoise.connect(pipeFilter).connect(pipeGain).connect(master);
          pipeNoise.start(now);
          pipeNoise.stop(now + 0.78);

          const ring = ctx.createOscillator();
          const ringGain = ctx.createGain();
          ring.type = "triangle";
          ring.frequency.setValueAtTime(172, now + 0.06);
          ring.frequency.exponentialRampToValueAtTime(94, now + 0.5);
          ringGain.gain.setValueAtTime(0.0001, now + 0.05);
          ringGain.gain.linearRampToValueAtTime(0.04 + threat * 0.06, now + 0.12);
          ringGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.56);
          ring.connect(ringGain).connect(master);
          ring.start(now + 0.05);
          ring.stop(now + 0.6);
          return;
        }

        [0, 0.22].forEach((offset, index) => {
          const step = ctx.createBufferSource();
          const stepFilter = ctx.createBiquadFilter();
          const stepGain = ctx.createGain();
          const len = Math.max(1, Math.floor(ctx.sampleRate * 0.18));
          const buffer = ctx.createBuffer(1, len, ctx.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < len; i += 1) {
            const t = i / len;
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 1.8);
          }
          step.buffer = buffer;
          stepFilter.type = "bandpass";
          stepFilter.frequency.setValueAtTime(260 + threat * 180 + index * 40, now + offset);
          stepFilter.Q.value = 1.1;
          stepGain.gain.setValueAtTime(0.0001, now + offset);
          stepGain.gain.linearRampToValueAtTime(0.05 + threat * 0.08, now + offset + 0.028);
          stepGain.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.18);
          step.connect(stepFilter).connect(stepGain).connect(master);
          step.start(now + offset);
          step.stop(now + offset + 0.19);
        });

        const shoe = ctx.createOscillator();
        const shoeGain = ctx.createGain();
        const shoeFilter = ctx.createBiquadFilter();
        shoe.type = "triangle";
        shoe.frequency.setValueAtTime(146 + threat * 34, now + 0.02);
        shoe.frequency.exponentialRampToValueAtTime(78, now + 0.24);
        shoeFilter.type = "lowpass";
        shoeFilter.frequency.setValueAtTime(420 + threat * 180, now + 0.02);
        shoeGain.gain.setValueAtTime(0.0001, now + 0.01);
        shoeGain.gain.linearRampToValueAtTime(0.04 + threat * 0.05, now + 0.06);
        shoeGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.28);
        shoe.connect(shoeFilter).connect(shoeGain).connect(master);
        shoe.start(now + 0.01);
        shoe.stop(now + 0.3);
      };

      const playBonnieMaskToggleSound = (isPuttingOn) => {
        const ctx = getJumpscareAudioContext();
        if (!ctx) return;
        const now = ctx.currentTime;
        const master = ctx.createGain();
        const thump = ctx.createOscillator();
        const thumpGain = ctx.createGain();
        const slide = ctx.createOscillator();
        const slideFilter = ctx.createBiquadFilter();
        const slideGain = ctx.createGain();
        const hiss = ctx.createBufferSource();
        const hissFilter = ctx.createBiquadFilter();
        const hissGain = ctx.createGain();
        const latch = ctx.createOscillator();
        const latchGain = ctx.createGain();
        const len = Math.max(1, Math.floor(ctx.sampleRate * 0.3));
        const noiseBuffer = ctx.createBuffer(1, len, ctx.sampleRate);
        const channel = noiseBuffer.getChannelData(0);

        for (let i = 0; i < len; i += 1) {
          const t = i / len;
          channel[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 1.4);
        }

        master.gain.setValueAtTime(0.0001, now);
        master.gain.exponentialRampToValueAtTime(isPuttingOn ? 0.13 : 0.11, now + 0.012);
        master.gain.exponentialRampToValueAtTime(0.0001, now + 0.24);
        master.connect(ctx.destination);

        thump.type = "triangle";
        thump.frequency.setValueAtTime(isPuttingOn ? 132 : 104, now);
        thump.frequency.exponentialRampToValueAtTime(isPuttingOn ? 64 : 144, now + 0.07);
        thumpGain.gain.setValueAtTime(0.001, now);
        thumpGain.gain.exponentialRampToValueAtTime(isPuttingOn ? 0.24 : 0.18, now + 0.01);
        thumpGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.1);
        thump.connect(thumpGain).connect(master);

        slide.type = "square";
        slide.frequency.setValueAtTime(isPuttingOn ? 980 : 410, now);
        slide.frequency.exponentialRampToValueAtTime(isPuttingOn ? 190 : 1180, now + 0.12);
        slideFilter.type = "bandpass";
        slideFilter.frequency.setValueAtTime(isPuttingOn ? 760 : 960, now);
        slideFilter.Q.value = 2.6;
        slideGain.gain.setValueAtTime(0.001, now);
        slideGain.gain.exponentialRampToValueAtTime(isPuttingOn ? 0.15 : 0.11, now + 0.01);
        slideGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.14);
        slide.connect(slideFilter).connect(slideGain).connect(master);

        hiss.buffer = noiseBuffer;
        hissFilter.type = "highpass";
        hissFilter.frequency.setValueAtTime(isPuttingOn ? 1450 : 1280, now);
        hissFilter.Q.value = 0.5;
        hissGain.gain.setValueAtTime(0.001, now);
        hissGain.gain.exponentialRampToValueAtTime(isPuttingOn ? 0.09 : 0.07, now + 0.008);
        hissGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
        hiss.connect(hissFilter).connect(hissGain).connect(master);

        latch.type = "square";
        latch.frequency.setValueAtTime(isPuttingOn ? 720 : 540, now + 0.085);
        latchGain.gain.setValueAtTime(0.0001, now + 0.08);
        latchGain.gain.exponentialRampToValueAtTime(isPuttingOn ? 0.07 : 0.05, now + 0.094);
        latchGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
        latch.connect(latchGain).connect(master);

        thump.start(now);
        thump.stop(now + 0.12);
        slide.start(now);
        slide.stop(now + 0.15);
        hiss.start(now);

        const now = ctx.currentTime;
        const inhaleLen = randomFloat(0.58, 0.74);

        const totalLen = inhaleLen + exhaleLen;
        const noiseLen = Math.max(1, Math.floor(ctx.sampleRate * (totalLen + 0.16)));
        const noiseBuffer = ctx.createBuffer(1, noiseLen, ctx.sampleRate);
        const channel = noiseBuffer.getChannelData(0);

        for (let i = 0; i < noiseLen; i += 1) {
          const t = i / noiseLen;
          const grain = Math.sin(i * 0.032) * 0.28 + Math.sin(i * 0.0076) * 0.2;
          channel[i] = (Math.random() * 2 - 1) * (0.76 + grain) * (0.85 - t * 0.26);

        const breath = ctx.createBufferSource();
        const lowPass = ctx.createBiquadFilter();
        const chest = ctx.createBiquadFilter();

        breath.buffer = noiseBuffer;
        lowPass.type = "lowpass";
        lowPass.frequency.setValueAtTime(820, now);
        lowPass.frequency.linearRampToValueAtTime(640, now + inhaleLen);
        lowPass.frequency.linearRampToValueAtTime(980, now + totalLen);
        lowPass.Q.value = 0.9;

        chest.type = "peaking";
        chest.frequency.setValueAtTime(190, now);
        chest.Q.value = 1.05;
        chest.gain.setValueAtTime(5.8, now);

        master.gain.setValueAtTime(0.0001, now);
        master.gain.exponentialRampToValueAtTime(0.052, now + inhaleLen * 0.34);
        master.gain.exponentialRampToValueAtTime(0.064, now + inhaleLen);
        master.gain.exponentialRampToValueAtTime(0.033, now + inhaleLen + exhaleLen * 0.44);
        master.gain.exponentialRampToValueAtTime(0.0001, now + totalLen + 0.08);

        breath.connect(lowPass).connect(chest).connect(master).connect(ctx.destination);
        breath.start(now);
        breath.stop(now + totalLen + 0.1);
